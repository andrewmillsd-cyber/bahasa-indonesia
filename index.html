<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Bahasa ID">
<meta name="theme-color" content="#FF6B4A">
<title>Bahasa Indonesia — 30-Day Journey</title>
<link rel="manifest" href="manifest.json">
<!-- Apple touch icon (no Chrome badge on iOS) -->
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

:root {
  --coral:   #FF6B4A;
  --saffron: #FFAB2E;
  --jade:    #2DC78A;
  --ocean:   #3B9EFF;
  --plum:    #A855F7;
  --rose:    #FF4D8D;
  --cream:   #FFF8F0;
  --ink:     #1A1208;
  --bark:    #3D2B1A;
  --sand:    #F5E6D0;
  --mist:    #EDF4FF;
  --white:   #FFFFFF;

  --grad-hero: linear-gradient(135deg, #FF6B4A 0%, #FFAB2E 50%, #FF6B4A 100%);
  --grad-jade: linear-gradient(135deg, #2DC78A, #1BA870);
  --grad-ocean: linear-gradient(135deg, #3B9EFF, #1B7AE0);
  --grad-plum: linear-gradient(135deg, #A855F7, #7C3AED);
  --grad-rose: linear-gradient(135deg, #FF4D8D, #E0295A);

  --shadow-sm: 0 2px 8px rgba(26,18,8,0.08);
  --shadow-md: 0 8px 24px rgba(26,18,8,0.12);
  --shadow-lg: 0 20px 60px rgba(26,18,8,0.18);
  --shadow-coral: 0 8px 32px rgba(255,107,74,0.35);
  --shadow-jade: 0 8px 32px rgba(45,199,138,0.3);
  --shadow-ocean: 0 8px 32px rgba(59,158,255,0.3);

  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 24px;
  --r-xl: 32px;

  --font-display: 'Clash Display', Georgia, serif;
  --font-body: 'Sora', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── SCROLLBAR ─────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,107,74,0.3); border-radius: 3px; }

/* ─── LAYOUT ─────────────────────────────── */
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar {
  width: 280px; min-width: 280px;
  background: var(--ink);
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
}
.sidebar::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 200px;
  background: var(--grad-hero);
  opacity: .12;
  pointer-events: none;
}
.main { flex: 1; overflow-y: auto; background: var(--cream); }

/* ─── SIDEBAR HEADER ─────────────────────── */
.sb-head {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  position: relative;
}
.sb-logo {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 700;
  background: var(--grad-hero);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
  margin-bottom: 2px;
}
.sb-tagline { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: .08em; text-transform: uppercase; }

/* ─── STREAK ─────────────────────────────── */
.streak-card {
  margin: 14px 16px 0;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--r-md);
  padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
}
.streak-flame { font-size: 24px; line-height: 1; }
.streak-info { flex: 1; }
.streak-num {
  font-family: var(--font-display);
  font-size: 26px; font-weight: 700;
  color: var(--saffron);
  line-height: 1;
}
.streak-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 1px; }
.streak-today { font-size: 11px; color: var(--jade); margin-left: auto; }

/* ─── PROGRESS ───────────────────────────── */
.sb-progress { padding: 14px 16px 10px; }
.sb-prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
.sb-prog-label { font-size: 12px; color: rgba(255,255,255,0.5); }
.sb-prog-val { font-size: 12px; font-weight: 600; color: var(--coral); }
.prog-track {
  height: 6px; background: rgba(255,255,255,0.08);
  border-radius: 3px; overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: var(--grad-hero);
  border-radius: 3px;
  transition: width .6s cubic-bezier(.34,1.56,.64,1);
  position: relative;
}
.prog-fill::after {
  content: '';
  position: absolute; right: 0; top: 50%; transform: translateY(-50%);
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--saffron);
  box-shadow: 0 0 8px var(--saffron);
}
.sb-words { font-size: 11px; color: rgba(255,255,255,0.3); text-align: center; margin-top: 6px; }

/* ─── CONTINUE BTN ───────────────────────── */
.continue-btn {
  margin: 10px 16px 12px;
  padding: 13px;
  background: var(--grad-hero);
  border: none; border-radius: var(--r-md);
  font-family: var(--font-display); font-size: 14px; font-weight: 600;
  color: white;
  cursor: pointer;
  width: calc(100% - 32px);
  letter-spacing: .02em;
  box-shadow: var(--shadow-coral);
  transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.continue-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 36px rgba(255,107,74,.45); }
.continue-btn:active { transform: translateY(0); }

/* ─── NAV ────────────────────────────────── */
.nav-scroll { flex: 1; overflow-y: auto; padding: 6px 0 20px; }
.week-head {
  padding: 12px 20px 5px;
  font-size: 9px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
  color: rgba(255,255,255,0.25);
}
.day-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  transition: all .15s;
  border-left: 3px solid transparent;
  position: relative;
}
.day-item:hover { background: rgba(255,255,255,0.05); }
.day-item.active {
  background: rgba(255,107,74,0.12);
  border-left-color: var(--coral);
}
.day-num {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.4);
  flex-shrink: 0;
  transition: all .2s;
}
.day-item.active .day-num { background: var(--coral); color: white; }
.day-item.done .day-num { background: var(--jade); color: white; }
.day-title-nav { font-size: 12px; color: rgba(255,255,255,0.45); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-item.active .day-title-nav { color: rgba(255,255,255,0.9); }
.day-item.done .day-title-nav { color: rgba(255,255,255,0.5); }

/* ─── MAIN HERO ──────────────────────────── */
.lesson-hero {
  background: var(--grad-hero);
  padding: 36px 40px 32px;
  position: relative;
  overflow: hidden;
}
.lesson-hero::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 220px; height: 220px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
}
.lesson-hero::after {
  content: '';
  position: absolute; bottom: -60px; right: 80px;
  width: 140px; height: 140px;
  background: rgba(255,255,255,0.07);
  border-radius: 50%;
}
.hero-eyebrow {
  font-size: 11px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  margin-bottom: 8px;
  position: relative; z-index: 1;
}
.hero-title {
  font-family: var(--font-display);
  font-size: 38px; font-weight: 700;
  color: white;
  letter-spacing: -0.025em;
  line-height: 1.1;
  margin-bottom: 8px;
  position: relative; z-index: 1;
}
.hero-week {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding: 5px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 500; color: white;
  position: relative; z-index: 1;
}

/* ─── TAB NAV ────────────────────────────── */
.tab-bar {
  background: white;
  border-bottom: 2px solid var(--sand);
  padding: 0 32px;
  display: flex; gap: 0;
  position: sticky; top: 0; z-index: 10;
  box-shadow: var(--shadow-sm);
}
.tab-btn {
  padding: 16px 18px;
  border: none; background: transparent;
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  color: #999;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all .2s;
  white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
}
.tab-btn:hover { color: var(--coral); }
.tab-btn.active { color: var(--coral); border-bottom-color: var(--coral); }
.tab-pill {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px; padding: 0 5px;
  background: var(--coral); color: white;
  border-radius: 9px; font-size: 10px; font-weight: 700;
}

/* ─── PANELS ─────────────────────────────── */
.panel { display: none; padding: 32px 40px 60px; animation: fadeUp .3s ease; }
.panel.active { display: block; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* ─── SECTION TITLE ──────────────────────── */
.section-title {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
}
.section-sub { font-size: 13px; color: #888; margin-bottom: 20px; }

/* ─── VOCAB GRID ─────────────────────────── */
.vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; }
.vcard {
  background: white;
  border-radius: var(--r-lg);
  padding: 18px;
  cursor: pointer;
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
  box-shadow: var(--shadow-sm);
  border: 2px solid transparent;
  position: relative;
  overflow: hidden;
  min-height: 100px;
}
.vcard::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: var(--vc-color, var(--coral));
  transform: scaleX(0);
  transition: transform .3s;
  transform-origin: left;
}
.vcard:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--sand); }
.vcard:hover::before { transform: scaleX(1); }
.vcard.flipped { background: var(--ink); border-color: var(--coral); transform: translateY(-4px); }
.vcard.flipped::before { transform: scaleX(1); }

.vc-word { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.vcard.flipped .vc-word { color: white; }
.vc-pron { font-size: 11px; color: #aaa; font-style: italic; margin-bottom: 10px; }
.vcard.flipped .vc-pron { color: rgba(255,255,255,0.4); }
.vc-meaning { font-size: 14px; font-weight: 500; color: var(--coral); display: none; }
.vcard.flipped .vc-meaning { display: block; }
.vc-audio {
  position: absolute; bottom: 12px; right: 12px;
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--sand);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; color: var(--bark);
  font-size: 14px;
}
.vc-audio:hover { background: var(--coral); color: white; transform: scale(1.1); }
.vcard.flipped .vc-audio { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }
.vc-flip-hint {
  text-align: center; font-size: 12px; color: #bbb;
  margin-top: 14px; margin-bottom: 0;
}

/* ─── GRAMMAR CARD ───────────────────────── */
.grammar-hero {
  background: linear-gradient(135deg, var(--ocean) 0%, var(--plum) 100%);
  border-radius: var(--r-xl);
  padding: 28px 32px;
  color: white;
  margin-bottom: 20px;
  position: relative; overflow: hidden;
}
.grammar-hero::after {
  content: '文';
  position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
  font-size: 100px; opacity: .07; line-height: 1;
  font-family: serif;
}
.grammar-rule-label {
  font-size: 10px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: rgba(255,255,255,0.6);
  margin-bottom: 8px;
}
.grammar-rule-title {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 700;
  color: white; line-height: 1.2;
  margin-bottom: 14px;
}
.grammar-explain { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.7; }
.grammar-examples { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.grammar-ex {
  background: white;
  border-radius: var(--r-md);
  padding: 14px 16px 14px 20px;
  border-left: 4px solid var(--jade);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
  box-shadow: var(--shadow-sm);
  transition: all .2s;
}
.grammar-ex:hover { transform: translateX(4px); box-shadow: var(--shadow-md); }
.grammar-ex-id { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.grammar-ex-en { font-size: 12px; color: #888; }
.ex-speak-btn {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  background: var(--sand); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all .2s;
}
.ex-speak-btn:hover { background: var(--jade); transform: scale(1.1); }

/* ─── SENTENCE BUILDER ───────────────────── */
.builder-card {
  background: white;
  border-radius: var(--r-xl);
  padding: 24px 28px;
  box-shadow: var(--shadow-sm);
  border: 2px dashed var(--sand);
  transition: border-color .3s;
}
.builder-card:focus-within { border-color: var(--ocean); }
.builder-title { font-family: var(--font-display); font-size: 17px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
.builder-english {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--mist); border-radius: var(--r-sm);
  padding: 7px 12px; font-size: 13px; color: var(--ocean);
  font-weight: 500; margin-bottom: 16px;
}
.drop-zone {
  min-height: 54px; background: var(--cream);
  border: 2px dashed #ddd;
  border-radius: var(--r-md);
  padding: 10px 12px;
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  margin-bottom: 14px;
  transition: all .3s;
}
.drop-zone.correct { border-color: var(--jade); background: #F0FDF7; }
.drop-zone.wrong { border-color: var(--coral); background: #FFF5F3; }
.drop-zone-hint { font-size: 12px; color: #ccc; }
.tile-pool { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.tile {
  padding: 8px 14px;
  background: white;
  border: 2px solid var(--sand);
  border-radius: var(--r-sm);
  font-family: var(--font-display); font-size: 14px; font-weight: 500;
  color: var(--ink); cursor: pointer;
  transition: all .2s cubic-bezier(.34,1.56,.64,1);
  user-select: none;
}
.tile:hover { border-color: var(--ocean); color: var(--ocean); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
.tile.used { opacity: .25; cursor: not-allowed; transform: none; }
.tile.placed {
  background: var(--ink); border-color: var(--ink);
  color: white;
}
.tile.placed:hover { background: var(--coral); border-color: var(--coral); transform: none; }
.builder-actions { display: flex; gap: 10px; align-items: center; }
.btn-check {
  padding: 11px 22px;
  background: var(--grad-ocean);
  border: none; border-radius: var(--r-sm);
  font-family: var(--font-display); font-size: 14px; font-weight: 600;
  color: white; cursor: pointer;
  box-shadow: var(--shadow-ocean);
  transition: all .2s;
}
.btn-check:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(59,158,255,.4); }
.btn-clear {
  padding: 11px 18px;
  background: transparent; border: 2px solid var(--sand);
  border-radius: var(--r-sm); font-family: var(--font-body); font-size: 13px;
  color: #999; cursor: pointer; transition: all .2s;
}
.btn-clear:hover { border-color: #ccc; color: var(--ink); }
.builder-feedback {
  margin-top: 12px; padding: 12px 16px;
  border-radius: var(--r-sm); font-size: 13px; font-weight: 500;
  display: none;
}
.builder-feedback.show { display: block; }
.builder-feedback.ok { background: #F0FDF7; color: #16a34a; border: 1px solid #86efac; }
.builder-feedback.err { background: #FFF5F3; color: var(--coral); border: 1px solid #fca5a5; }

/* ─── SPEAKING ───────────────────────────── */
.speak-task-banner {
  background: linear-gradient(135deg, #FFFBEB, #FFF5E0);
  border: 2px solid rgba(255,171,46,0.3);
  border-radius: var(--r-xl);
  padding: 20px 24px;
  margin-bottom: 20px;
}
.task-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--saffron); margin-bottom: 6px; }
.task-text { font-size: 15px; color: var(--bark); line-height: 1.6; font-weight: 500; }

.samples-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.sample-card {
  background: white;
  border-radius: var(--r-lg);
  padding: 16px 18px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow-sm);
  transition: all .2s;
  border: 2px solid transparent;
}
.sample-card:hover { border-color: var(--sand); transform: translateX(4px); }
.sample-num {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  background: var(--sand);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--bark);
}
.sample-text { flex: 1; }
.sample-id { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
.sample-en { font-size: 12px; color: #999; }
.sample-play {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  background: var(--grad-hero);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: white;
  box-shadow: var(--shadow-coral);
  transition: all .2s;
}
.sample-play:hover { transform: scale(1.12); box-shadow: 0 8px 24px rgba(255,107,74,.5); }

/* ─── TIMER ──────────────────────────────── */
.timer-widget {
  background: var(--ink);
  border-radius: var(--r-xl);
  padding: 28px;
  text-align: center;
  position: relative; overflow: hidden;
}
.timer-widget::before {
  content: '';
  position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(255,107,74,0.15) 0%, transparent 70%);
}
.timer-label { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
.timer-ring-wrap { position: relative; width: 130px; height: 130px; margin: 0 auto 20px; }
.timer-ring-wrap svg { transform: rotate(-90deg); }
.timer-num {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: var(--font-display); font-size: 36px; font-weight: 700; color: white;
  line-height: 1;
}
.timer-sub { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 4px; }
.timer-start {
  padding: 14px 32px;
  background: var(--grad-hero);
  border: none; border-radius: var(--r-md);
  font-family: var(--font-display); font-size: 15px; font-weight: 700;
  color: white; cursor: pointer;
  box-shadow: var(--shadow-coral);
  transition: all .2s;
  letter-spacing: .02em;
}
.timer-start:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(255,107,74,.5); }
.timer-start.running { background: linear-gradient(135deg, #FF4D8D, #E0295A); box-shadow: 0 8px 32px rgba(255,77,141,.4); }
.timer-hint { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 14px; }

/* ─── LISTEN ─────────────────────────────── */
.listen-hero {
  background: linear-gradient(135deg, #FF4D8D, #A855F7);
  border-radius: var(--r-xl);
  padding: 24px 28px;
  display: flex; align-items: center; gap: 20px;
  text-decoration: none;
  margin-bottom: 20px;
  transition: all .25s;
  position: relative; overflow: hidden;
}
.listen-hero::before {
  content: '▶';
  position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
  font-size: 120px; color: rgba(255,255,255,0.06); line-height: 1;
}
.listen-hero:hover { transform: translateY(-3px); box-shadow: 0 20px 50px rgba(168,85,247,.4); }
.listen-play-btn {
  width: 60px; height: 60px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: white;
  border: 2px solid rgba(255,255,255,0.3);
}
.listen-info { flex: 1; }
.listen-title { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: white; margin-bottom: 5px; }
.listen-desc { font-size: 13px; color: rgba(255,255,255,0.7); }
.listen-cta { font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 600; margin-top: 6px; }

.coach-box {
  background: linear-gradient(135deg, #FFFBEB 0%, #FFF0F5 100%);
  border: 2px solid rgba(255,171,46,0.25);
  border-radius: var(--r-lg);
  padding: 20px 24px;
  margin-bottom: 20px;
}
.coach-head { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--saffron); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.coach-text { font-size: 14px; color: var(--bark); line-height: 1.7; }

.audio-examples { background: white; border-radius: var(--r-lg); padding: 20px; box-shadow: var(--shadow-sm); }
.audio-ex-title { font-size: 12px; font-weight: 600; color: #999; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 14px; }
.audio-ex-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--sand); }
.audio-ex-row:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.audio-mini-btn {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: var(--grad-jade); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: white;
  box-shadow: var(--shadow-jade);
  transition: all .2s;
}
.audio-mini-btn:hover { transform: scale(1.1); }
.audio-ex-id { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--ink); }
.audio-ex-en { font-size: 12px; color: #aaa; }

/* ─── QUIZ ───────────────────────────────── */
.quiz-wrap { max-width: 580px; }
.quiz-progress-bar { height: 4px; background: var(--sand); border-radius: 2px; margin-bottom: 24px; }
.quiz-progress-fill { height: 100%; background: var(--grad-hero); border-radius: 2px; transition: width .4s ease; }
.quiz-q-card {
  background: white;
  border-radius: var(--r-xl);
  padding: 28px;
  box-shadow: var(--shadow-md);
  margin-bottom: 16px;
}
.quiz-q-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--coral); margin-bottom: 10px; }
.quiz-q-text { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--ink); line-height: 1.4; }
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-opt {
  padding: 14px 18px;
  background: white; border: 2px solid var(--sand);
  border-radius: var(--r-md); text-align: left;
  font-family: var(--font-body); font-size: 14px; color: var(--ink);
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; gap: 12px;
}
.quiz-opt::before {
  content: attr(data-letter);
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: var(--sand); color: var(--bark);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  transition: all .2s;
}
.quiz-opt:hover:not(:disabled) { border-color: var(--ocean); color: var(--ocean); transform: translateX(4px); }
.quiz-opt:hover:not(:disabled)::before { background: var(--ocean); color: white; }
.quiz-opt.correct { border-color: var(--jade); color: #16a34a; background: #F0FDF7; }
.quiz-opt.correct::before { background: var(--jade); color: white; }
.quiz-opt.wrong { border-color: var(--coral); color: var(--coral); background: #FFF5F3; }
.quiz-opt.wrong::before { background: var(--coral); color: white; }

.quiz-feedback-bar {
  padding: 12px 18px; border-radius: var(--r-md);
  font-size: 14px; font-weight: 500; margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.quiz-feedback-bar.ok { background: #F0FDF7; color: #16a34a; }
.quiz-feedback-bar.err { background: #FFF5F3; color: var(--coral); }
.btn-next {
  padding: 11px 22px;
  background: var(--grad-hero); border: none;
  border-radius: var(--r-sm); font-family: var(--font-display); font-size: 14px; font-weight: 600;
  color: white; cursor: pointer; box-shadow: var(--shadow-coral);
  transition: all .2s;
}
.btn-next:hover { transform: translateY(-1px); }

.fill-card {
  background: white; border-radius: var(--r-xl);
  padding: 28px; box-shadow: var(--shadow-md); margin-bottom: 16px;
}
.fill-q-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--plum); margin-bottom: 10px; }
.fill-prompt { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
.fill-hint { font-size: 12px; color: #bbb; margin-bottom: 16px; display: flex; align-items: center; gap: 4px; }
.fill-input {
  width: 100%; padding: 14px 18px;
  background: var(--cream); border: 2px solid var(--sand);
  border-radius: var(--r-md); font-family: var(--font-display); font-size: 17px;
  color: var(--ink); outline: none;
  transition: all .2s;
}
.fill-input:focus { border-color: var(--plum); background: white; box-shadow: 0 0 0 4px rgba(168,85,247,.1); }
.fill-check {
  margin-top: 12px; padding: 12px 24px;
  background: var(--grad-plum); border: none;
  border-radius: var(--r-sm); font-family: var(--font-display); font-size: 14px; font-weight: 600;
  color: white; cursor: pointer; box-shadow: 0 8px 24px rgba(168,85,247,.3);
  transition: all .2s;
}
.fill-check:hover { transform: translateY(-1px); }
.fill-fb { margin-top: 12px; padding: 12px 16px; border-radius: var(--r-sm); font-size: 13px; font-weight: 500; }
.fill-fb.ok { background: #F0FDF7; color: #16a34a; border: 1px solid #86efac; }
.fill-fb.err { background: #FFF5F3; color: var(--coral); border: 1px solid #fca5a5; }

.score-card {
  background: var(--ink); border-radius: var(--r-xl);
  padding: 36px; text-align: center;
  position: relative; overflow: hidden;
}
.score-card::before {
  content: '';
  position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(45,199,138,0.2) 0%, transparent 70%);
}
.score-emoji { font-size: 48px; margin-bottom: 12px; }
.score-num { font-family: var(--font-display); font-size: 56px; font-weight: 700; color: var(--jade); line-height: 1; margin-bottom: 8px; }
.score-label { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 20px; }
.score-retry {
  padding: 12px 24px; background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15); border-radius: var(--r-sm);
  font-family: var(--font-body); font-size: 13px; color: rgba(255,255,255,0.7);
  cursor: pointer; transition: all .2s;
}
.score-retry:hover { background: rgba(255,255,255,0.15); color: white; }

/* ─── SRS ────────────────────────────────── */
.srs-empty {
  background: white; border-radius: var(--r-xl);
  padding: 48px 32px; text-align: center;
  box-shadow: var(--shadow-sm);
}
.srs-empty-icon { font-size: 48px; margin-bottom: 12px; }
.srs-empty-title { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--ink); margin-bottom: 8px; }
.srs-empty-sub { font-size: 14px; color: #999; }

.srs-card-wrap {
  background: var(--ink); border-radius: var(--r-xl);
  padding: 32px; text-align: center;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.srs-card-wrap::before {
  content: '';
  position: absolute; top: -100px; right: -100px;
  width: 350px; height: 350px;
  background: radial-gradient(circle, rgba(59,158,255,.12) 0%, transparent 60%);
}
.srs-count { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 20px; }
.srs-word {
  font-family: var(--font-display); font-size: 42px; font-weight: 700;
  color: white; margin-bottom: 6px; letter-spacing: -0.02em;
}
.srs-pron { font-size: 14px; color: rgba(255,255,255,0.35); font-style: italic; margin-bottom: 24px; }
.srs-reveal {
  padding: 13px 28px;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: var(--r-md);
  font-family: var(--font-display); font-size: 15px; font-weight: 600;
  color: white; cursor: pointer; transition: all .2s;
  margin-bottom: 6px;
}
.srs-reveal:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.3); }
.srs-audio-row { display: flex; justify-content: center; margin-top: 10px; }
.srs-play {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: white; transition: all .2s;
}
.srs-play:hover { background: var(--ocean); }

.srs-answer-area { margin-top: 24px; display: none; animation: fadeUp .3s ease; }
.srs-answer-area.shown { display: block; }
.srs-meaning { font-family: var(--font-display); font-size: 26px; font-weight: 600; color: var(--saffron); margin-bottom: 20px; }
.srs-rate-label { font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 12px; letter-spacing: .06em; text-transform: uppercase; }
.srs-btns { display: flex; gap: 10px; justify-content: center; }
.srs-btn {
  flex: 1; max-width: 110px; padding: 12px 8px;
  border: none; border-radius: var(--r-md);
  font-family: var(--font-display); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .2s; line-height: 1.3;
}
.srs-btn:hover { transform: translateY(-2px); }
.srs-hard { background: rgba(255,107,74,.15); color: var(--coral); border: 2px solid rgba(255,107,74,.3); }
.srs-hard:hover { background: rgba(255,107,74,.25); }
.srs-ok { background: rgba(59,158,255,.15); color: var(--ocean); border: 2px solid rgba(59,158,255,.3); }
.srs-ok:hover { background: rgba(59,158,255,.25); }
.srs-easy { background: rgba(45,199,138,.15); color: var(--jade); border: 2px solid rgba(45,199,138,.3); }
.srs-easy:hover { background: rgba(45,199,138,.25); }
.srs-prog { font-size: 11px; color: rgba(255,255,255,0.2); margin-top: 18px; }

/* ─── DONE SECTION ───────────────────────── */
.done-bar {
  padding: 20px 40px 32px;
  border-top: 2px solid var(--sand);
  display: flex; align-items: center; gap: 16px;
}
.mark-done {
  padding: 14px 28px;
  background: transparent;
  border: 2px solid var(--jade);
  border-radius: var(--r-md);
  font-family: var(--font-display); font-size: 15px; font-weight: 600;
  color: var(--jade); cursor: pointer;
  transition: all .2s;
  display: flex; align-items: center; gap: 8px;
}
.mark-done:hover { background: var(--jade); color: white; box-shadow: var(--shadow-jade); transform: translateY(-1px); }
.mark-done.done { background: var(--grad-jade); color: white; border-color: transparent; box-shadow: var(--shadow-jade); }
.done-tip { font-size: 12px; color: #bbb; }

/* ─── COLOR ROTATION FOR VOCAB ───────────── */
.vcard:nth-child(4n+1) { --vc-color: var(--coral); }
.vcard:nth-child(4n+2) { --vc-color: var(--jade); }
.vcard:nth-child(4n+3) { --vc-color: var(--ocean); }
.vcard:nth-child(4n+4) { --vc-color: var(--plum); }


/* ─── TESTS TAB ─────────────────────────────── */
.test-type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:22px}
.tt-btn{padding:16px 12px;border:2px solid var(--sand);border-radius:var(--r-lg);background:white;cursor:pointer;text-align:center;transition:all .2s;font-family:var(--font-body)}
.tt-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.tt-btn.sel-mc{border-color:var(--coral);background:#FFF5F3}
.tt-btn.sel-tr{border-color:var(--ocean);background:var(--mist)}
.tt-btn.sel-li{border-color:var(--plum);background:#F5F0FF}
.tt-btn.sel-di{border-color:var(--jade);background:#F0FDF7}
.tt-icon{font-size:26px;margin-bottom:5px}
.tt-name{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:3px}
.tt-desc{font-size:10px;color:#aaa}
.tr-q-box{padding:14px 18px;background:var(--mist);border-radius:var(--r-md);font-family:var(--font-display);font-size:18px;color:var(--ocean);margin:0 0 14px;font-weight:600}
.listen-play-big{width:68px;height:68px;border-radius:50%;background:var(--grad-plum);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;color:white;box-shadow:0 8px 32px rgba(168,85,247,.4);transition:all .2s;margin:0 auto 12px}
.listen-play-big:hover{transform:scale(1.08)}
.di-hint{font-size:11px;color:#bbb;margin-bottom:12px;text-align:center}
.wk-locked{background:white;border-radius:var(--r-xl);padding:40px;text-align:center;box-shadow:var(--shadow-sm);border:2px dashed var(--sand)}
.wkl-icon{font-size:44px;margin-bottom:12px}
.wkl-title{font-family:var(--font-display);font-size:20px;font-weight:600;color:var(--ink);margin-bottom:8px}
.wkl-sub{font-size:13px;color:#aaa;line-height:1.7;margin-bottom:18px}
.wkl-bar{background:var(--sand);border-radius:var(--r-md);padding:11px 18px;font-size:12px;color:var(--bark)}
.wk-avail{background:linear-gradient(135deg,var(--saffron),var(--coral));border-radius:var(--r-xl);padding:28px;text-align:center;margin-bottom:20px}
.wka-icon{font-size:48px;margin-bottom:8px}
.wka-title{font-family:var(--font-display);font-size:22px;font-weight:700;color:white;margin-bottom:6px}
.wka-sub{font-size:13px;color:rgba(255,255,255,.8);margin-bottom:16px}
.wka-btn{padding:12px 28px;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.4);border-radius:var(--r-md);font-family:var(--font-display);font-size:14px;font-weight:700;color:white;cursor:pointer;transition:all .2s}
.wka-btn:hover{background:rgba(255,255,255,.35)}
.speak-rate{margin-top:18px;display:none;animation:fadeUp .3s ease}
.speak-rate.show{display:block}
.sr-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:11px}
.sr-row{display:flex;gap:9px;justify-content:center}
.sr-btn{flex:1;max-width:120px;padding:11px 8px;border:none;border-radius:var(--r-md);font-family:var(--font-display);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;line-height:1.3}
.sr-btn:hover{transform:translateY(-2px)}
.sr-hard{background:rgba(255,107,74,.15);color:var(--coral);border:2px solid rgba(255,107,74,.3)}
.sr-ok{background:rgba(59,158,255,.15);color:var(--ocean);border:2px solid rgba(59,158,255,.3)}
.sr-easy{background:rgba(45,199,138,.15);color:var(--jade);border:2px solid rgba(45,199,138,.3)}
.sr-result{margin-top:11px;font-size:12px;color:rgba(255,255,255,.4)}


/* ─── DIALOGUE ──────────────────────────────── */
.dialogue-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:6px}
.dlg-line{display:flex;align-items:flex-start;gap:12px;animation:fadeUp .25s ease}
.dlg-line.speaker-B{flex-direction:row-reverse}
.dlg-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;margin-top:2px}
.dlg-line.speaker-A .dlg-avatar{background:var(--grad-hero);color:white}
.dlg-line.speaker-B .dlg-avatar{background:var(--grad-jade);color:white}
.dlg-bubble{max-width:72%;background:white;border-radius:18px;padding:12px 16px;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .2s;border:2px solid transparent}
.dlg-line.speaker-B .dlg-bubble{background:var(--mist);border-radius:18px 4px 18px 18px}
.dlg-line.speaker-A .dlg-bubble{border-radius:4px 18px 18px 18px}
.dlg-bubble:hover{border-color:var(--coral);transform:scale(1.01)}
.dlg-id{font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--ink);margin-bottom:3px}
.dlg-en{font-size:11px;color:#aaa}
.dlg-play-all{display:flex;align-items:center;gap:10px;margin-top:14px;padding:11px 16px;background:var(--ink);border-radius:var(--r-md);cursor:pointer;border:none;color:white;font-family:var(--font-display);font-size:13px;font-weight:600;transition:all .2s;width:100%;justify-content:center}
.dlg-play-all:hover{background:#2a1f10;box-shadow:var(--shadow-md)}
/* ─── PHRASES ─────────────────────────────────── */
.phrase-grid{display:flex;flex-direction:column;gap:9px}
.phrase-card{background:white;border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:flex-start;gap:12px;box-shadow:var(--shadow-sm);border-left:3px solid var(--saffron);cursor:pointer;transition:all .2s}
.phrase-card:hover{transform:translateX(4px);box-shadow:var(--shadow-md)}
.phrase-card:nth-child(3n+1){border-left-color:var(--coral)}
.phrase-card:nth-child(3n+2){border-left-color:var(--jade)}
.phrase-card:nth-child(3n+3){border-left-color:var(--ocean)}
.phrase-body{flex:1}
.phrase-id{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--ink);margin-bottom:2px}
.phrase-en{font-size:12px;color:var(--ocean);font-weight:500;margin-bottom:4px}
.phrase-ctx{font-size:11px;color:#aaa;font-style:italic}
.phrase-spk{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:var(--sand);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;margin-top:2px}
.phrase-spk:hover{background:var(--saffron);transform:scale(1.1)}
/* ─── READING ─────────────────────────────────── */
.reading-card{background:white;border-radius:var(--r-xl);padding:24px 28px;box-shadow:var(--shadow-sm);margin-bottom:16px;border:2px solid var(--sand)}
.reading-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--plum);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.reading-text{font-family:var(--font-display);font-size:17px;font-weight:500;color:var(--ink);line-height:1.9;margin-bottom:14px}
.reading-text.revealed{}
.reading-translation{font-size:13px;color:#888;line-height:1.8;display:none;padding-top:12px;border-top:1px solid var(--sand);margin-top:4px}
.reading-translation.show{display:block}
.reading-actions{display:flex;gap:10px;margin-bottom:20px}
.btn-reveal-tr{padding:9px 18px;background:transparent;border:2px solid var(--plum);border-radius:var(--r-sm);font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--plum);cursor:pointer;transition:all .2s}
.btn-reveal-tr:hover{background:var(--plum);color:white}
.btn-play-reading{padding:9px 18px;background:rgba(168,85,247,.1);border:2px solid rgba(168,85,247,.2);border-radius:var(--r-sm);font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--plum);cursor:pointer;transition:all .2s}
.btn-play-reading:hover{background:rgba(168,85,247,.2)}
.reading-q-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ocean);margin-bottom:12px}
.reading-qs{display:flex;flex-direction:column;gap:10px}
.reading-q{background:var(--mist);border-radius:var(--r-md);padding:14px 16px}
.rq-text{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px}
.rq-input{width:100%;padding:9px 13px;background:white;border:2px solid rgba(59,158,255,.2);border-radius:var(--r-sm);font-family:var(--font-body);font-size:13px;color:var(--ink);outline:none;transition:all .2s}
.rq-input:focus{border-color:var(--ocean);box-shadow:0 0 0 3px rgba(59,158,255,.1)}
.rq-hint{font-size:10px;color:#bbb;margin-top:4px}
.rq-check{margin-top:8px;padding:8px 16px;background:var(--grad-ocean);border:none;border-radius:var(--r-sm);font-family:var(--font-display);font-size:12px;font-weight:600;color:white;cursor:pointer;transition:all .2s}
.rq-check:hover{transform:translateY(-1px)}
.rq-fb{margin-top:6px;font-size:11px;font-weight:600;display:none}
.rq-fb.ok{color:var(--jade);display:block}
.rq-fb.err{color:var(--coral);display:block}
/* ─── GRAMMAR EXERCISES ───────────────────────── */
.ex-grid{display:flex;flex-direction:column;gap:12px}
.ex-card{background:white;border-radius:var(--r-lg);padding:18px 20px;box-shadow:var(--shadow-sm);border:2px solid var(--sand)}
.ex-card.correct{border-color:var(--jade);background:#F0FDF7}
.ex-card.wrong{border-color:var(--coral);background:#FFF5F3}
.ex-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--coral);margin-bottom:8px}
.ex-prompt{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--ink);margin-bottom:10px;line-height:1.5}
.ex-input{width:100%;padding:10px 14px;background:var(--cream);border:2px solid var(--sand);border-radius:var(--r-sm);font-family:var(--font-display);font-size:15px;color:var(--ink);outline:none;transition:all .2s}
.ex-input:focus{border-color:var(--coral);background:white;box-shadow:0 0 0 3px rgba(255,107,74,.1)}
.ex-hint{font-size:11px;color:#bbb;margin-top:5px}
.ex-btn{margin-top:10px;padding:9px 20px;background:var(--grad-hero);border:none;border-radius:var(--r-sm);font-family:var(--font-display);font-size:13px;font-weight:600;color:white;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-coral)}
.ex-btn:hover{transform:translateY(-1px)}
.ex-fb{margin-top:8px;font-size:12px;font-weight:600;display:none}
.ex-fb.show.ok{display:block;color:var(--jade)}
.ex-fb.show.err{display:block;color:var(--coral)}
/* order exercise */
.ex-order-dz{min-height:44px;background:var(--cream);border:2px dashed #ddd;border-radius:var(--r-sm);padding:8px 10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px;transition:all .3s}
.ex-order-dz.ok{border-color:var(--jade);background:#F0FDF7}
.ex-order-dz.err{border-color:var(--coral);background:#FFF5F3}
.ex-tile{padding:6px 12px;background:white;border:2px solid var(--sand);border-radius:var(--r-sm);font-family:var(--font-display);font-size:13px;cursor:pointer;transition:all .2s}
.ex-tile:hover{border-color:var(--ocean);color:var(--ocean);transform:translateY(-1px)}
.ex-tile.used{opacity:.2;cursor:not-allowed}
.ex-tile.placed{background:var(--ink);border-color:var(--ink);color:white}


/* ─── WRITING PANEL ──────────────────────────── */
.write-intro{background:linear-gradient(135deg,var(--jade),#1BA870);border-radius:var(--r-lg);padding:16px 20px;margin-bottom:18px;color:white}
.write-intro-title{font-family:var(--font-display);font-size:15px;font-weight:700;margin-bottom:4px}
.write-intro-sub{font-size:12px;color:rgba(255,255,255,.75);line-height:1.5}
.write-prompt-card{background:white;border-radius:var(--r-xl);padding:22px 26px;box-shadow:var(--shadow-sm);margin-bottom:14px;border:2px solid var(--sand);transition:border-color .2s}
.write-prompt-card:focus-within{border-color:var(--jade)}
.write-prompt-num{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--jade);margin-bottom:8px}
.write-prompt-text{font-size:14px;color:var(--bark);font-weight:500;margin-bottom:12px;line-height:1.6}
.write-starter{display:flex;align-items:center;gap:8px;background:#F0FDF7;border-radius:var(--r-sm);padding:8px 12px;margin-bottom:14px;font-size:12px;color:var(--jade);font-style:italic}
.write-area{width:100%;min-height:90px;padding:13px 16px;background:var(--cream);border:2px solid var(--sand);border-radius:var(--r-md);font-family:var(--font-body);font-size:14px;color:var(--ink);outline:none;resize:vertical;line-height:1.7;transition:all .2s}
.write-area:focus{border-color:var(--jade);background:white;box-shadow:0 0 0 3px rgba(45,199,138,.12)}
.write-actions{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
.write-check-btn{padding:10px 20px;background:var(--grad-jade);border:none;border-radius:var(--r-sm);font-family:var(--font-display);font-size:13px;font-weight:600;color:white;cursor:pointer;box-shadow:var(--shadow-jade);transition:all .2s}
.write-check-btn:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(45,199,138,.4)}
.write-clear-btn{padding:10px 16px;background:transparent;border:2px solid var(--sand);border-radius:var(--r-sm);font-size:12px;color:#999;cursor:pointer;font-family:var(--font-body);transition:all .2s}
.write-clear-btn:hover{border-color:#ccc;color:var(--ink)}
.write-wc{font-size:11px;color:#bbb;margin-left:auto}
.write-fb{margin-top:12px;padding:14px 16px;border-radius:var(--r-md);font-size:13px;line-height:1.6;display:none}
.write-fb.show{display:block}
.write-fb.ok{background:#F0FDF7;border:1px solid #86efac;color:#166534}
.write-fb.partial{background:#FFFBEB;border:1px solid #fde68a;color:#92400e}
.write-fb.empty{background:#FFF5F3;border:1px solid #fca5a5;color:var(--coral)}

/* ─── RESPONSIVE ─────────────────────────── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .lesson-hero, .panel, .done-bar, .tab-bar { padding-left: 20px; padding-right: 20px; }
  .hero-title { font-size: 28px; }
}

</style>
</head>
<body>
<div class="app">
<div class="sidebar">
  <div class="sb-head">
    <div class="sb-logo">Bahasa Indonesia</div>
    <div class="sb-tag">30-Day Mastery Journey</div>
  </div>
  <div class="streak-card">
    <div class="s-flame">🔥</div>
    <div style="flex:1"><div class="s-num" id="streak-num">0</div><div class="s-label">day streak</div></div>
    <div class="s-today" id="streak-today"></div>
  </div>
  <div class="sb-prog">
    <div class="sb-prog-row"><span class="sb-prog-label" id="prog-label">0/30 days</span><span class="sb-prog-val" id="prog-pct">0%</span></div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="sb-words" id="sb-words">0 words introduced</div>
  </div>
  <button class="cont-btn" onclick="continueLearning()">▶ Continue Learning</button>
  <div class="nav-sc" id="nav-scroll"></div>
</div>
<div class="main" id="main">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px">
    <div style="font-size:48px">🇮🇩</div>
    <div style="font-family:Georgia,serif;font-size:22px;font-weight:700;color:#FF6B4A">Loading...</div>
    <div style="font-size:13px;color:#aaa">Bahasa Indonesia 30-Day Journey</div>
  </div>
</div>
</div>

<script src="data.js" defer></script>
<script src="app.js" defer></script>
<script>
  // Register service worker — only on real hosting, never in preview/iframe
  (function() {
    // Only register service worker on real HTTPS deployments (e.g. GitHub Pages)
    // Skip on Claude preview, localhost, file://, or any non-github.io host in dev
    if (!('serviceWorker' in navigator)) return;
    if (location.protocol !== 'https:') return;
    var host = location.hostname;
    var skipHosts = ['claudeusercontent.com', 'claude.ai', 'localhost', '127.0.0.1'];
    if (skipHosts.some(function(h){ return host === h || host.endsWith('.'+h); })) return;
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('./sw.js', { scope: './' })
        .then(function(r) { console.log('Offline ready'); })
        .catch(function() { /* sw.js not available in this environment */ });
    });
  })();
</script>
</body>
</html>

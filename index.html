<!-- v4 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Bahasa ID">
<meta name="theme-color" content="#FF6B4A">
<title>Bahasa Indonesia — 30-Day Journey</title>
<link rel="manifest" href="manifest.json">
<!-- Apple touch icon (no Chrome badge on iOS) -->
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

:root {
  --coral:   #FF6B4A;
  --saffron: #FFAB2E;
  --jade:    #2DC78A;
  --ocean:   #3B9EFF;
  --plum:    #A855F7;
  --rose:    #FF4D8D;
  --cream:   #FFF8F0;
  --ink:     #1A1208;
  --bark:    #3D2B1A;
  --sand:    #F5E6D0;
  --mist:    #EDF4FF;
  --white:   #FFFFFF;

  --grad-hero: linear-gradient(135deg, #FF6B4A 0%, #FFAB2E 50%, #FF6B4A 100%);
  --grad-jade: linear-gradient(135deg, #2DC78A, #1BA870);
  --grad-ocean: linear-gradient(135deg, #3B9EFF, #1B7AE0);
  --grad-plum: linear-gradient(135deg, #A855F7, #7C3AED);
  --grad-rose: linear-gradient(135deg, #FF4D8D, #E0295A);

  --shadow-sm: 0 2px 8px rgba(26,18,8,0.08);
  --shadow-md: 0 8px 24px rgba(26,18,8,0.12);
  --shadow-lg: 0 20px 60px rgba(26,18,8,0.18);
  --shadow-coral: 0 8px 32px rgba(255,107,74,0.35);
  --shadow-jade: 0 8px 32px rgba(45,199,138,0.3);
  --shadow-ocean: 0 8px 32px rgba(59,158,255,0.3);

  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 24px;
  --r-xl: 32px;

  --font-display: 'Clash Display', Georgia, serif;
  --font-body: 'Sora', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── SCROLLBAR ─────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,107,74,0.3); border-radius: 3px; }

/* ─── LAYOUT ─────────────────────────────── */
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar {
  width: 280px; min-width: 280px;
  background: var(--ink);
  display: flex; flex-direction: column;
  overflow-x: hidden;
  overflow-y: hidden;
  position: relative;
}
.sidebar::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 200px;
  background: var(--grad-hero);
  opacity: .12;
  pointer-events: none;
}
.main { flex: 1; overflow-y: auto; background: var(--cream); }

/* ─── SIDEBAR HEADER ─────────────────────── */
.sb-head {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  position: relative;
}
.sb-logo {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 700;
  background: var(--grad-hero);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
  margin-bottom: 2px;
}
.sb-tagline { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: .08em; text-transform: uppercase; }

/* ─── STREAK ─────────────────────────────── */
.streak-card {
  margin: 14px 16px 0;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--r-md);
  padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
}
.streak-flame { font-size: 24px; line-height: 1; }
.streak-info { flex: 1; }
.streak-num {
  font-family: var(--font-display);
  font-size: 26px; font-weight: 700;
  color: var(--saffron);
  line-height: 1;
}
.streak-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 1px; }
.streak-today { font-size: 11px; color: var(--jade); margin-left: auto; }

/* ─── PROGRESS ───────────────────────────── */
.sb-progress { padding: 14px 16px 10px; }
.sb-prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
.sb-prog-label { font-size: 12px; color: rgba(255,255,255,0.5); }
.sb-prog-val { font-size: 12px; font-weight: 600; color: var(--coral); }
.prog-track {
  height: 6px; background: rgba(255,255,255,0.08);
  border-radius: 3px; overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: var(--grad-hero);
  border-radius: 3px;
  transition: width .6s cubic-bezier(.34,1.56,.64,1);
  position: relative;
}
.prog-fill::after {
  content: '';
  position: absolute; right: 0; top: 50%; transform: translateY(-50%);
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--saffron);
  box-shadow: 0 0 8px var(--saffron);
}
.sb-words { font-size: 11px; color: rgba(255,255,255,0.3); text-align: center; margin-top: 6px; }

/* ─── CONTINUE BTN ───────────────────────── */
.continue-btn {
  margin: 10px 16px 12px;
  padding: 13px;
  background: var(--grad-hero);
  border: none; border-radius: var(--r-md);
  font-family: var(--font-display); font-size: 14px; font-weight: 600;
  color: white;
  cursor: pointer;
  width: calc(100% - 32px);
  letter-spacing: .02em;
  box-shadow: var(--shadow-coral);
  transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.continue-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 36px rgba(255,107,74,.45); }
.continue-btn:active { transform: translateY(0); }

/* ─── NAV ────────────────────────────────── */
.nav-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 6px 0 20px; min-height: 0; }
.week-head {
  padding: 12px 20px 5px;
  font-size: 9px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
  color: rgba(255,255,255,0.25);
}
.day-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  transition: all .15s;
  border-left: 3px solid transparent;
  position: relative;
}
.day-item:hover { background: rgba(255,255,255,0.05); }
.day-item.active {
  background: rgba(255,107,74,0.12);
  border-left-color: var(--coral);
}
.day-num {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.4);
  flex-shrink: 0;
  transition: all .2s;
}
.day-item.active .day-num { background: var(--coral); color: white; }
.day-item.done .day-num { background: var(--jade); color: white; }
.day-title-nav { font-size: 12px; color: rgba(255,255,255,0.45); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-item.active .day-title-nav { color: rgba(255,255,255,0.9); }
.day-item.done .day-title-nav { color: rgba(255,255,255,0.5); }

/* ─── MAIN HERO ──────────────────────────── */
.lesson-hero {
  background: var(--grad-hero);
  padding: 36px 40px 32px;
  position: relative;
  overflow: hidden;
}
.lesson-hero::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 220px; height: 220px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
}
.lesson-hero::after {
  content: '';
  position: absolute; bottom: -60px; right: 80px;
  width: 140px; height: 140px;
  background: rgba(255,255,255,0.07);
  border-radius: 50%;
}
.hero-eyebrow {
  font-size: 11px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  margin-bottom: 8px;
  position: relative; z-index: 1;
}
.hero-title {
  font-family: var(--font-display);
  font-size: 38px; font-weight: 700;
  color: white;
  letter-spacing: -0.025em;
  line-height: 1.1;
  margin-bottom: 8px;
  position: relative; z-index: 1;
}
.hero-week {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding: 5px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 500; color: white;
  position: relative; z-index: 1;
}

/* ─── TAB NAV ────────────────────────────── */
.tab-bar {
  background: white;
  border-bottom: 2px solid var(--sand);
  padding: 0 32px;
  display: flex; gap: 0;
  position: sticky; top: 0; z-index: 10;
  box-shadow: var(--shadow-sm);
}
.tab-btn {
  padding: 16px 18px;
  border: none; background: transparent;
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  color: #999;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all .2s;
  white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
}
.tab-btn:hover { color: var(--coral); }
.tab-btn.active { color: var(--coral); border-bottom-color: var(--coral); }
.tab-pill {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px; padding: 0 5px;
  background: var(--coral); color: white;
  border-radius: 9px; font-size: 10px; font-weight: 700;
}

/* ─── PANELS ─────────────────────────────── */
.panel { display: none; padding: 32px 40px 60px; animation: fadeUp .3s ease; }
.panel.active { display: block; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* ─── SECTION TITLE ──────────────────────── */
.section-title {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
}
.section-sub { font-size: 13px; color: #888; margin-bottom: 20px; }

/* ─── VOCAB GRID ─────────────────────────── */
.vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; }
.vcard {
  background: white;
  border-radius: var(--r-lg);
  padding: 18px;
  cursor: pointer;
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
  box-shadow: var(--shadow-sm);
  border: 2px solid transparent;
  position: relative;
  overflow: hidden;
  min-height: 100px;
}
.vcard::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: var(--vc-color, var(--coral));
  transform: scaleX(0);
  transition: transform .3s;
  transform-origin: left;
}
.vcard:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--sand); }
.vcard:hover::before { transform: scaleX(1); }
.vcard.flipped { background: var(--ink); border-color: var(--coral); transform: translateY(-4px); }
.vcard.flipped::before { transform: scaleX(1); }

.vc-word { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.vcard.flipped .vc-word { color: white; }
.vc-pron { font-size: 11px; color: #aaa; font-style: italic; margin-bottom: 10px; }
.vcard.flipped .vc-pron { color: rgba(255,255,255,0.4); }
.vc-meaning { font-size: 14px; font-weight: 500; color: var(--coral); display: none; }
.vcard.flipped .vc-meaning { display: block; }
.vc-audio {
  position: absolute; bottom: 12px; right: 12px;
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--sand);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; color: var(--bark);
  font-size: 14px;
}
.vc-audio:hover { background: var(--coral); color: white; transform: scale(1.1); }
.vcard.flipped .vc-audio { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }
.vc-flip-hint {
  text-align: center; font-size: 12px; color: #bbb;
  margin-top: 14px; margin-bottom: 0;
}

/* ─── GRAMMAR CARD ───────────────────────── */
.grammar-hero {
  background: linear-gradient(135deg, var(--ocean) 0%, var(--plum) 100%);
  border-radius: var(--r-xl);
  padding: 28px 32px;
  color: white;
  margin-bottom: 20px;
  position: relative; overflow: hidden;
}
.grammar-hero::after {
  content: '文';
  position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
  font-size: 100px; opacity: .07; line-height: 1;
  font-family: serif;
}
.grammar-rule-label {
  font-size: 10px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: rgba(255,255,255,0.6);
  margin-bottom: 8px;
}
.grammar-rule-title {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 700;
  color: white; line-height: 1.2;
  margin-bottom: 14px;
}
.grammar-explain { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.7; }
.grammar-examples { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.grammar-ex {
  background: white;
  border-radius: var(--r-md);
  padding: 14px 16px 14px 20px;
  border-left: 4px solid var(--jade);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
  box-shadow: var(--shadow-sm);
  transition: all .2s;
}
.grammar-ex:hover { transform: translateX(4px); box-shadow: var(--shadow-md); }
.grammar-ex-id { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.grammar-ex-en { font-size: 12px; color: #888; }
.ex-speak-btn {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  background: var(--sand); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all .2s;
}
.ex-speak-btn:hover { background: var(--jade); transform: scale(1.1); }

/* ─── SENTENCE BUILDER ───────────────────── */
.builder-card {
  background: white;
  border-radius: var(--r-xl);
  padding: 24px 28px;
  box-shadow: var(--shadow-sm);
  border: 2px dashed var(--sand);
  transition: border-color .3s;
}
.builder-card:focus-within { border-color: var(--ocean); }
.builder-title { font-family: var(--font-display); font-size: 17px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
.builder-english {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--mist); border-radius: var(--r-sm);
  padding: 7px 12px; font-size: 13px; color: var(--ocean);
  font-weight: 500; margin-bottom: 16px;
}
.drop-zone {
  min-height: 54px; background: var(--cream);
  border: 2px dashed #ddd;
  border-radius: var(--r-md);
  padding: 10px 12px;
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  margin-bottom: 14px;
  transition: all .3s;
}
.drop-zone.correct { border-color: var(--jade); background: #F0FDF7; }
.drop-zone.wrong { border-color: var(--coral); background: #FFF5F3; }
.drop-zone-hint { font-size: 12px; color: #ccc; }
.tile-pool { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.tile {
  padding: 8px 14px;
  background: white;
  border: 2px solid var(--sand);
  border-radius: var(--r-sm);
  font-family: var(--font-display); font-size: 14px; font-weight: 500;
  color: var(--ink); cursor: pointer;
  transition: all .2s cubic-bezier(.34,1.56,.64,1);
  user-select: none;
}
.tile:hover { border-color: var(--ocean); color: var(--ocean); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
.tile.used { opacity: .25; cursor: not-allowed; transform: none; }
.tile.placed {
  background: var(--ink); border-color: var(--ink);
  color: white;
}
.tile.placed:hover { background: var(--coral); border-color: var(--coral); transform: none; }
.builder-actions { display: flex; gap: 10px; align-items: center; }
.btn-check {
  padding: 11px 22px;
  background: var(--grad-ocean);
  border: none; border-radius: var(--r-sm);
  font-family: var(--font-display); font-size: 14px; font-weight: 600;
  color: white; cursor: pointer;
  box-shadow: var(--shadow-ocean);
  transition: all .2s;
}
.btn-check:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(59,158,255,.4); }
.btn-clear {
  padding: 11px 18px;
  background: transparent; border: 2px solid var(--sand);
  border-radius: var(--r-sm); font-family: var(--font-body); font-size: 13px;
  color: #999; cursor: pointer; transition: all .2s;
}
.btn-clear:hover { border-color: #ccc; color: var(--ink); }
.builder-feedback {
  margin-top: 12px; padding: 12px 16px;
  border-radius: var(--r-sm); font-size: 13px; font-weight: 500;
  display: none;
}
.builder-feedback.show { display: block; }
.builder-feedback.ok { background: #F0FDF7; color: #16a34a; border: 1px solid #86efac; }
.builder-feedback.err { background: #FFF5F3; color: var(--coral); border: 1px solid #fca5a5; }

/* ─── SPEAKING ───────────────────────────── */
.speak-task-banner {
  background: linear-gradient(135deg, #FFFBEB, #FFF5E0);
  border: 2px solid rgba(255,171,46,0.3);
  border-radius: var(--r-xl);
  padding: 20px 24px;
  margin-bottom: 20px;
}
.task-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--saffron); margin-bottom: 6px; }
.task-text { font-size: 15px; color: var(--bark); line-height: 1.6; font-weight: 500; }

.samples-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.sample-card {
  background: white;
  border-radius: var(--r-lg);
  padding: 16px 18px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow-sm);
  transition: all .2s;
  border: 2px solid transparent;
}
.sample-card:hover { border-color: var(--sand); transform: translateX(4px); }
.sample-num {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  background: var(--sand);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--bark);
}
.sample-text { flex: 1; }
.sample-id { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
.sample-en { font-size: 12px; color: #999; }
.sample-play {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  background: var(--grad-hero);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: white;
  box-shadow: var(--shadow-coral);
  transition: all .2s;
}
.sample-play:hover { transform: scale(1.12); box-shadow: 0 8px 24px rgba(255,107,74,.5); }

/* ─── TIMER ──────────────────────────────── */
.timer-widget {
  background: var(--ink);
  border-radius: var(--r-xl);
  padding: 28px;
  text-align: center;
  position: relative; overflow: hidden;
}
.timer-widget::before {
  content: '';
  position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(255,107,74,0.15) 0%, transparent 70%);
}
.timer-label { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
.timer-ring-wrap { position: relative; width: 130px; height: 130px; margin: 0 auto 20px; }
.timer-ring-wrap svg { transform: rotate(-90deg); }
.timer-num {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: var(--font-display); font-size: 36px; font-weight: 700; color: white;
  line-height: 1;
}
.timer-sub { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 4px; }
.timer-start {
  padding: 14px 32px;
  background: var(--grad-hero);
  border: none; border-radius: var(--r-md);
  font-family: var(--font-display); font-size: 15px; font-weight: 700;
  color: white; cursor: pointer;
  box-shadow: var(--shadow-coral);
  transition: all .2s;
  letter-spacing: .02em;
}
.timer-start:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(255,107,74,.5); }
.timer-start.running { background: linear-gradient(135deg, #FF4D8D, #E0295A); box-shadow: 0 8px 32px rgba(255,77,141,.4); }
.timer-hint { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 14px; }

/* ─── LISTEN ─────────────────────────────── */
.listen-hero {
  background: linear-gradient(135deg, #FF4D8D, #A855F7);
  border-radius: var(--r-xl);
  padding: 24px 28px;
  display: flex; align-items: center; gap: 20px;
  text-decoration: none;
  margin-bottom: 20px;
  transition: all .25s;
  position: relative; overflow: hidden;
}
.listen-hero::before {
  content: '▶';
  position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
  font-size: 120px; color: rgba(255,255,255,0.06); line-height: 1;
}
.listen-hero:hover { transform: translateY(-3px); box-shadow: 0 20px 50px rgba(168,85,247,.4); }
.listen-play-btn {
  width: 60px; height: 60px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: white;
  border: 2px solid rgba(255,255,255,0.3);
}
.listen-info { flex: 1; }
.listen-title { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: white; margin-bottom: 5px; }
.listen-desc { font-size: 13px; color: rgba(255,255,255,0.7); }
.listen-cta { font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 600; margin-top: 6px; }

.coach-box {
  background: linear-gradient(135deg, #FFFBEB 0%, #FFF0F5 100%);
  border: 2px solid rgba(255,171,46,0.25);
  border-radius: var(--r-lg);
  padding: 20px 24px;
  margin-bottom: 20px;
}
.coach-head { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--saffron); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.coach-text { font-size: 14px; color: var(--bark); line-height: 1.7; }

.audio-examples { background: white; border-radius: var(--r-lg); padding: 20px; box-shadow: var(--shadow-sm); }
.audio-ex-title { font-size: 12px; font-weight: 600; color: #999; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 14px; }
.audio-ex-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--sand); }
.audio-ex-row:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.audio-mini-btn {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: var(--grad-jade); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: white;
  box-shadow: var(--shadow-jade);
  transition: all .2s;
}
.audio-mini-btn:hover { transform: scale(1.1); }
.audio-ex-id { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--ink); }
.audio-ex-en { font-size: 12px; color: #aaa; }

/* ─── QUIZ ───────────────────────────────── */
.quiz-wrap { max-width: 580px; }
.quiz-progress-bar { height: 4px; background: var(--sand); border-radius: 2px; margin-bottom: 24px; }
.quiz-progress-fill { height: 100%; background: var(--grad-hero); border-radius: 2px; transition: width .4s ease; }
.quiz-q-card {
  background: white;
  border-radius: var(--r-xl);
  padding: 28px;
  box-shadow: var(--shadow-md);
  margin-bottom: 16px;
}
.quiz-q-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--coral); margin-bottom: 10px; }
.quiz-q-text { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--ink); line-height: 1.4; }
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-opt {
  padding: 14px 18px;
  background: white; border: 2px solid var(--sand);
  border-radius: var(--r-md); text-align: left;
  font-family: var(--font-body); font-size: 14px; color: var(--ink);
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; gap: 12px;
}
.quiz-opt::before {
  content: attr(data-letter);
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: var(--sand); color: var(--bark);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  transition: all .2s;
}
.quiz-opt:hover:not(:disabled) { border-color: var(--ocean); color: var(--ocean); transform: translateX(4px); }
.quiz-opt:hover:not(:disabled)::before { background: var(--ocean); color: white; }
.quiz-opt.correct { border-color: var(--jade); color: #16a34a; background: #F0FDF7; }
.quiz-opt.correct::before { background: var(--jade); color: white; }
.quiz-opt.wrong { border-color: var(--coral); color: var(--coral); background: #FFF5F3; }
.quiz-opt.wrong::before { background: var(--coral); color: white; }

.quiz-feedback-bar {
  padding: 12px 18px; border-radius: var(--r-md);
  font-size: 14px; font-weight: 500; margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.quiz-feedback-bar.ok { background: #F0FDF7; color: #16a34a; }
.quiz-feedback-bar.err { background: #FFF5F3; color: var(--coral); }
.btn-next {
  padding: 11px 22px;
  background: var(--grad-hero); border: none;
  border-radius: var(--r-sm); font-family: var(--font-display); font-size: 14px; font-weight: 600;
  color: white; cursor: pointer; box-shadow: var(--shadow-coral);
  transition: all .2s;
}
.btn-next:hover { transform: translateY(-1px); }

.fill-card {
  background: white; border-radius: var(--r-xl);
  padding: 28px; box-shadow: var(--shadow-md); margin-bottom: 16px;
}
.fill-q-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--plum); margin-bottom: 10px; }
.fill-prompt { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
.fill-hint { font-size: 12px; color: #bbb; margin-bottom: 16px; display: flex; align-items: center; gap: 4px; }
.fill-input {
  width: 100%; padding: 14px 18px;
  background: var(--cream); border: 2px solid var(--sand);
  border-radius: var(--r-md); font-family: var(--font-display); font-size: 17px;
  color: var(--ink); outline: none;
  transition: all .2s;
}
.fill-input:focus { border-color: var(--plum); background: white; box-shadow: 0 0 0 4px rgba(168,85,247,.1); }
.fill-check {
  margin-top: 12px; padding: 12px 24px;
  background: var(--grad-plum); border: none;
  border-radius: var(--r-sm); font-family: var(--font-display); font-size: 14px; font-weight: 600;
  color: white; cursor: pointer; box-shadow: 0 8px 24px rgba(168,85,247,.3);
  transition: all .2s;
}
.fill-check:hover { transform: translateY(-1px); }
.fill-fb { margin-top: 12px; padding: 12px 16px; border-radius: var(--r-sm); font-size: 13px; font-weight: 500; }
.fill-fb.ok { background: #F0FDF7; color: #16a34a; border: 1px solid #86efac; }
.fill-fb.err { background: #FFF5F3; color: var(--coral); border: 1px solid #fca5a5; }

.score-card {
  background: var(--ink); border-radius: var(--r-xl);
  padding: 36px; text-align: center;
  position: relative; overflow: hidden;
}
.score-card::before {
  content: '';
  position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(45,199,138,0.2) 0%, transparent 70%);
}
.score-emoji { font-size: 48px; margin-bottom: 12px; }
.score-num { font-family: var(--font-display); font-size: 56px; font-weight: 700; color: var(--jade); line-height: 1; margin-bottom: 8px; }
.score-label { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 20px; }
.score-retry {
  padding: 12px 24px; background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15); border-radius: var(--r-sm);
  font-family: var(--font-body); font-size: 13px; color: rgba(255,255,255,0.7);
  cursor: pointer; transition: all .2s;
}
.score-retry:hover { background: rgba(255,255,255,0.15); color: white; }

/* ─── SRS ────────────────────────────────── */
.srs-empty {
  background: white; border-radius: var(--r-xl);
  padding: 48px 32px; text-align: center;
  box-shadow: var(--shadow-sm);
}
.srs-empty-icon { font-size: 48px; margin-bottom: 12px; }
.srs-empty-title { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--ink); margin-bottom: 8px; }
.srs-empty-sub { font-size: 14px; color: #999; }

.srs-card-wrap {
  background: var(--ink); border-radius: var(--r-xl);
  padding: 32px; text-align: center;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.srs-card-wrap::before {
  content: '';
  position: absolute; top: -100px; right: -100px;
  width: 350px; height: 350px;
  background: radial-gradient(circle, rgba(59,158,255,.12) 0%, transparent 60%);
}
.srs-count { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 20px; }
.srs-word {
  font-family: var(--font-display); font-size: 42px; font-weight: 700;
  color: white; margin-bottom: 6px; letter-spacing: -0.02em;
}
.srs-pron { font-size: 14px; color: rgba(255,255,255,0.35); font-style: italic; margin-bottom: 24px; }
.srs-reveal {
  padding: 13px 28px;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: var(--r-md);
  font-family: var(--font-display); font-size: 15px; font-weight: 600;
  color: white; cursor: pointer; transition: all .2s;
  margin-bottom: 6px;
}
.srs-reveal:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.3); }
.srs-audio-row { display: flex; justify-content: center; margin-top: 10px; }
.srs-play {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: white; transition: all .2s;
}
.srs-play:hover { background: var(--ocean); }

.srs-answer-area { margin-top: 24px; display: none; animation: fadeUp .3s ease; }
.srs-answer-area.shown { display: block; }
.srs-meaning { font-family: var(--font-display); font-size: 26px; font-weight: 600; color: var(--saffron); margin-bottom: 20px; }
.srs-rate-label { font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 12px; letter-spacing: .06em; text-transform: uppercase; }
.srs-btns { display: flex; gap: 10px; justify-content: center; }
.srs-btn {
  flex: 1; max-width: 110px; padding: 12px 8px;
  border: none; border-radius: var(--r-md);
  font-family: var(--font-display); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .2s; line-height: 1.3;
}
.srs-btn:hover { transform: translateY(-2px); }
.srs-hard { background: rgba(255,107,74,.15); color: var(--coral); border: 2px solid rgba(255,107,74,.3); }
.srs-hard:hover { background: rgba(255,107,74,.25); }
.srs-ok { background: rgba(59,158,255,.15); color: var(--ocean); border: 2px solid rgba(59,158,255,.3); }
.srs-ok:hover { background: rgba(59,158,255,.25); }
.srs-easy { background: rgba(45,199,138,.15); color: var(--jade); border: 2px solid rgba(45,199,138,.3); }
.srs-easy:hover { background: rgba(45,199,138,.25); }
.srs-prog { font-size: 11px; color: rgba(255,255,255,0.2); margin-top: 18px; }

/* ─── DONE SECTION ───────────────────────── */
.done-bar {
  padding: 20px 40px 32px;
  border-top: 2px solid var(--sand);
  display: flex; align-items: center; gap: 16px;
}
.mark-done {
  padding: 14px 28px;
  background: transparent;
  border: 2px solid var(--jade);
  border-radius: var(--r-md);
  font-family: var(--font-display); font-size: 15px; font-weight: 600;
  color: var(--jade); cursor: pointer;
  transition: all .2s;
  display: flex; align-items: center; gap: 8px;
}
.mark-done:hover { background: var(--jade); color: white; box-shadow: var(--shadow-jade); transform: translateY(-1px); }
.mark-done.done { background: var(--grad-jade); color: white; border-color: transparent; box-shadow: var(--shadow-jade); }
.done-tip { font-size: 12px; color: #bbb; }

/* ─── COLOR ROTATION FOR VOCAB ───────────── */
.vcard:nth-child(4n+1) { --vc-color: var(--coral); }
.vcard:nth-child(4n+2) { --vc-color: var(--jade); }
.vcard:nth-child(4n+3) { --vc-color: var(--ocean); }
.vcard:nth-child(4n+4) { --vc-color: var(--plum); }


/* ─── TESTS TAB ─────────────────────────────── */
.test-type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:22px}
.tt-btn{padding:16px 12px;border:2px solid var(--sand);border-radius:var(--r-lg);background:white;cursor:pointer;text-align:center;transition:all .2s;font-family:var(--font-body)}
.tt-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.tt-btn.sel-mc{border-color:var(--coral);background:#FFF5F3}
.tt-btn.sel-tr{border-color:var(--ocean);background:var(--mist)}
.tt-btn.sel-li{border-color:var(--plum);background:#F5F0FF}
.tt-btn.sel-di{border-color:var(--jade);background:#F0FDF7}
.tt-icon{font-size:26px;margin-bottom:5px}
.tt-name{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:3px}
.tt-desc{font-size:10px;color:#aaa}
.tr-q-box{padding:14px 18px;background:var(--mist);border-radius:var(--r-md);font-family:var(--font-display);font-size:18px;color:var(--ocean);margin:0 0 14px;font-weight:600}
.listen-play-big{width:68px;height:68px;border-radius:50%;background:var(--grad-plum);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;color:white;box-shadow:0 8px 32px rgba(168,85,247,.4);transition:all .2s;margin:0 auto 12px}
.listen-play-big:hover{transform:scale(1.08)}
.di-hint{font-size:11px;color:#bbb;margin-bottom:12px;text-align:center}
.wk-locked{background:white;border-radius:var(--r-xl);padding:40px;text-align:center;box-shadow:var(--shadow-sm);border:2px dashed var(--sand)}
.wkl-icon{font-size:44px;margin-bottom:12px}
.wkl-title{font-family:var(--font-display);font-size:20px;font-weight:600;color:var(--ink);margin-bottom:8px}
.wkl-sub{font-size:13px;color:#aaa;line-height:1.7;margin-bottom:18px}
.wkl-bar{background:var(--sand);border-radius:var(--r-md);padding:11px 18px;font-size:12px;color:var(--bark)}
.wk-avail{background:linear-gradient(135deg,var(--saffron),var(--coral));border-radius:var(--r-xl);padding:28px;text-align:center;margin-bottom:20px}
.wka-icon{font-size:48px;margin-bottom:8px}
.wka-title{font-family:var(--font-display);font-size:22px;font-weight:700;color:white;margin-bottom:6px}
.wka-sub{font-size:13px;color:rgba(255,255,255,.8);margin-bottom:16px}
.wka-btn{padding:12px 28px;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.4);border-radius:var(--r-md);font-family:var(--font-display);font-size:14px;font-weight:700;color:white;cursor:pointer;transition:all .2s}
.wka-btn:hover{background:rgba(255,255,255,.35)}
.speak-rate{margin-top:18px;display:none;animation:fadeUp .3s ease}
.speak-rate.show{display:block}
.sr-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:11px}
.sr-row{display:flex;gap:9px;justify-content:center}
.sr-btn{flex:1;max-width:120px;padding:11px 8px;border:none;border-radius:var(--r-md);font-family:var(--font-display);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;line-height:1.3}
.sr-btn:hover{transform:translateY(-2px)}
.sr-hard{background:rgba(255,107,74,.15);color:var(--coral);border:2px solid rgba(255,107,74,.3)}
.sr-ok{background:rgba(59,158,255,.15);color:var(--ocean);border:2px solid rgba(59,158,255,.3)}
.sr-easy{background:rgba(45,199,138,.15);color:var(--jade);border:2px solid rgba(45,199,138,.3)}
.sr-result{margin-top:11px;font-size:12px;color:rgba(255,255,255,.4)}


/* ─── DIALOGUE ──────────────────────────────── */
.dialogue-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:6px}
.dlg-line{display:flex;align-items:flex-start;gap:12px;animation:fadeUp .25s ease}
.dlg-line.speaker-B{flex-direction:row-reverse}
.dlg-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;margin-top:2px}
.dlg-line.speaker-A .dlg-avatar{background:var(--grad-hero);color:white}
.dlg-line.speaker-B .dlg-avatar{background:var(--grad-jade);color:white}
.dlg-bubble{max-width:72%;background:white;border-radius:18px;padding:12px 16px;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .2s;border:2px solid transparent}
.dlg-line.speaker-B .dlg-bubble{background:var(--mist);border-radius:18px 4px 18px 18px}
.dlg-line.speaker-A .dlg-bubble{border-radius:4px 18px 18px 18px}
.dlg-bubble:hover{border-color:var(--coral);transform:scale(1.01)}
.dlg-id{font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--ink);margin-bottom:3px}
.dlg-en{font-size:11px;color:#aaa}
.dlg-play-all{display:flex;align-items:center;gap:10px;margin-top:14px;padding:11px 16px;background:var(--ink);border-radius:var(--r-md);cursor:pointer;border:none;color:white;font-family:var(--font-display);font-size:13px;font-weight:600;transition:all .2s;width:100%;justify-content:center}
.dlg-play-all:hover{background:#2a1f10;box-shadow:var(--shadow-md)}
/* ─── PHRASES ─────────────────────────────────── */
.phrase-grid{display:flex;flex-direction:column;gap:9px}
.phrase-card{background:white;border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:flex-start;gap:12px;box-shadow:var(--shadow-sm);border-left:3px solid var(--saffron);cursor:pointer;transition:all .2s}
.phrase-card:hover{transform:translateX(4px);box-shadow:var(--shadow-md)}
.phrase-card:nth-child(3n+1){border-left-color:var(--coral)}
.phrase-card:nth-child(3n+2){border-left-color:var(--jade)}
.phrase-card:nth-child(3n+3){border-left-color:var(--ocean)}
.phrase-body{flex:1}
.phrase-id{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--ink);margin-bottom:2px}
.phrase-en{font-size:12px;color:var(--ocean);font-weight:500;margin-bottom:4px}
.phrase-ctx{font-size:11px;color:#aaa;font-style:italic}
.phrase-spk{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:var(--sand);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;margin-top:2px}
.phrase-spk:hover{background:var(--saffron);transform:scale(1.1)}
/* ─── READING ─────────────────────────────────── */
.reading-card{background:white;border-radius:var(--r-xl);padding:24px 28px;box-shadow:var(--shadow-sm);margin-bottom:16px;border:2px solid var(--sand)}
.reading-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--plum);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.reading-text{font-family:var(--font-display);font-size:17px;font-weight:500;color:var(--ink);line-height:1.9;margin-bottom:14px}
.reading-text.revealed{}
.reading-translation{font-size:13px;color:#888;line-height:1.8;display:none;padding-top:12px;border-top:1px solid var(--sand);margin-top:4px}
.reading-translation.show{display:block}
.reading-actions{display:flex;gap:10px;margin-bottom:20px}
.btn-reveal-tr{padding:9px 18px;background:transparent;border:2px solid var(--plum);border-radius:var(--r-sm);font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--plum);cursor:pointer;transition:all .2s}
.btn-reveal-tr:hover{background:var(--plum);color:white}
.btn-play-reading{padding:9px 18px;background:rgba(168,85,247,.1);border:2px solid rgba(168,85,247,.2);border-radius:var(--r-sm);font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--plum);cursor:pointer;transition:all .2s}
.btn-play-reading:hover{background:rgba(168,85,247,.2)}
.reading-q-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ocean);margin-bottom:12px}
.reading-qs{display:flex;flex-direction:column;gap:10px}
.reading-q{background:var(--mist);border-radius:var(--r-md);padding:14px 16px}
.rq-text{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px}
.rq-input{width:100%;padding:9px 13px;background:white;border:2px solid rgba(59,158,255,.2);border-radius:var(--r-sm);font-family:var(--font-body);font-size:13px;color:var(--ink);outline:none;transition:all .2s}
.rq-input:focus{border-color:var(--ocean);box-shadow:0 0 0 3px rgba(59,158,255,.1)}
.rq-hint{font-size:10px;color:#bbb;margin-top:4px}
.rq-check{margin-top:8px;padding:8px 16px;background:var(--grad-ocean);border:none;border-radius:var(--r-sm);font-family:var(--font-display);font-size:12px;font-weight:600;color:white;cursor:pointer;transition:all .2s}
.rq-check:hover{transform:translateY(-1px)}
.rq-fb{margin-top:6px;font-size:11px;font-weight:600;display:none}

23:{t:'Slang & Particles',w:'Week 4',emoji:'✨',
  vocab:[
    {id:'Dong',en:'Please / come on (softens request)',p:'dong'},{id:'Sih',en:'Hmm / though (mild wonder)',p:'sih'},
    {id:'Lah',en:'Softens commands, adds certainty',p:'lah'},{id:'Nih',en:'Here you go / look at this',p:'nih'},
    {id:'Deh',en:'Persuasion / reluctant agreement',p:'deh'},{id:'Banget',en:'Very / so much (intensifier)',p:'bah-nget'},
    {id:'Kok',en:'Why / how come (mild surprise)',p:'kok'},{id:'Kan',en:'Right? Isn\'t it? (confirmation)',p:'kahn'},
    {id:'Gimana',en:'How? / So? (casual)',p:'gee-mah-nah'},{id:'Emang',en:'Really / indeed (casual)',p:'e-mang'}
  ],
  gr:{rule:'Particles add emotional tone — always at end of sentences',
    explain:'These sentence-final particles are what make Indonesian sound natural. "Lah" softens a command. "Dong" makes a request warmer. "Banget" intensifies. "Sih" adds surprise or wonder. They don\'t change grammar — they add FEELING.',
    ex:[{id:'Pergi lah, sudah terlambat!',en:'Just go, you\'re late!'},{id:'Kenapa sih kamu terlambat?',en:'Why are you late, though?'},{id:'Enak banget makanan ini!',en:'This food is SO delicious!'}]},

  speak:{task:'Use "dong", "lah", "banget", "sih", and "kan" in 5 natural sentences each.',dur:90,
    samples:[{id:'Tolong dong, saya butuh bantuan.',en:'Please help, I need assistance.'},{id:'Enak banget! Saya mau lagi.',en:'So delicious! I want more.'},{id:'Kenapa sih kamu tidak datang?',en:'Why didn\'t you come, though?'},{id:'Kamu sudah makan, kan?',en:'You\'ve already eaten, right?'}]},
  listen:{t:'Indonesian Comedy Skit with Particles',d:'YouTube · stand up comedy Indonesia subtitle — listen for particles!',u:'https://www.youtube.com/results?search_query=stand+up+comedy+Indonesia+subtitle+bahasa'},
  tip:'Particles are the secret ingredient that make Indonesian sound natural. Native speakers use "lah", "dong", and "sih" constantly — use them fearlessly!'
},
24:{t:'Telling Stories',w:'Week 4',emoji:'📖',
  vocab:[
    {id:'Pertama',en:'First / firstly',p:'per-tah-mah'},{id:'Lalu',en:'Then / after that',p:'lah-loo'},

    {id:'Jadi',en:'So / therefore',p:'jah-dee'},{id:'Sudah',en:'Already / have done',p:'soo-dah'},
    {id:'Belum',en:'Not yet',p:'beh-loom'},{id:'Pernah',en:'Have ever (experience)',p:'per-nah'},
    {id:'Tiba-tiba',en:'Suddenly',p:'tee-bah tee-bah'},{id:'Waktu itu',en:'At that time',p:'wak-too ee-too'}

  speak:{task:'Tell a story about your last weekend using: pertama, lalu, kemudian, akhirnya.',dur:120,
    samples:[{id:'Akhir pekan lalu, pertama saya bangun terlambat.',en:'Last weekend, first I woke up late.'},{id:'Lalu, saya sarapan dengan cepat.',en:'Then I had breakfast quickly.'},{id:'Kemudian saya pergi ke teman.',en:'After that I went to a friend\'s.'},{id:'Akhirnya, saya pulang dan tidur.',en:'Finally I went home and slept.'}]},

1:{dialogue:[{sp:'A',id:'Halo! Nama saya Budi. Siapa nama kamu?',en:'Hello! My name is Budi. What is your name?'},{sp:'B',id:'Halo Budi! Nama saya Siti. Senang bertemu!',en:'Hello Budi! My name is Siti. Nice to meet you!'},{sp:'A',id:'Senang bertemu juga, Siti! Apa kabar?',en:'Nice to meet you too, Siti! How are you?'},{sp:'B',id:'Kabar baik, terima kasih! Kamu dari mana?',en:'I\'m well, thank you! Where are you from?'},{sp:'A',id:'Saya dari Jakarta. Sampai jumpa!',en:'I\'m from Jakarta. See you again!'},{sp:'B',id:'Sampai jumpa! Hati-hati di jalan ya!',en:'See you! Take care on the road!'}],phrases:[{id:'Selamat datang!',en:'Welcome!',ctx:'When greeting someone arriving at your home or event'},{id:'Dengan senang hati.',en:'With pleasure / Gladly.',ctx:'A warm, polite way to say yes to a request'},{id:'Maaf, boleh saya tanya?',en:'Excuse me, may I ask?',ctx:'Polite way to start a question with a stranger'},{id:'Tidak masalah.',en:'No problem.',ctx:'Reassuring someone who apologised'},{id:'Saya tidak mengerti.',en:'I don\'t understand.',ctx:'When you need something repeated or explained'},{id:'Bisakah kamu bicara lebih pelan?',en:'Can you speak more slowly?',ctx:'Essential for learners — use freely!'},{id:'Tolong ulangi.',en:'Please repeat.',ctx:'Short and polite — use whenever needed'},{id:'Saya sedang belajar Bahasa Indonesia.',en:'I am learning Indonesian.',ctx:'People will immediately warm up and help you'}],reading:{text:'Nama saya Ana. Saya dari Australia. Saya belajar Bahasa Indonesia setiap hari. Bahasa Indonesia tidak terlalu sulit. Saya suka belajar bahasa baru!',translation:'My name is Ana. I am from Australia. I study Indonesian every day. Indonesian is not too difficult. I like learning new languages!',questions:[{q:'Siapa nama orang ini?',a:'Ana',hint:'Her name is in the first sentence'},{q:'Dari mana dia?',a:'Australia',hint:'From where? Second sentence'},{q:'Apakah Bahasa Indonesia sulit?',a:'Tidak, tidak terlalu sulit',hint:'The fourth sentence answers this'}]},exercises:[{type:'fill',prompt:'___ saya Ana. (My name is Ana)',ans:'Nama',hint:'The word for \'name\''},{type:'fill',prompt:'Apa ___? — Kabar baik! (How are you? — Fine!)',ans:'kabar',hint:'Part of the greeting \'apa kabar\''},{type:'order',words:['kasih','Terima','banyak'],ans:'Terima kasih banyak',en:'Thank you very much'},{type:'fill',prompt:'Senang ___ kamu! (Nice to meet you!)',ans:'bertemu',hint:'The verb \'to meet\''}]},
2:{dialogue:[{sp:'A',id:'Berapa umur kamu, Siti?',en:'How old are you, Siti?'},{sp:'B',id:'Saya dua puluh tiga tahun. Kamu?',en:'I am 23 years old. You?'},{sp:'A',id:'Saya dua puluh tahun. Kamu punya berapa saudara?',en:'I am 20. How many siblings do you have?'},{sp:'B',id:'Saya punya dua kakak dan satu adik. Jadi tiga!',en:'I have two older and one younger sibling. So three!'},{sp:'A',id:'Wah, banyak! Saya hanya satu adik.',en:'Wow, many! I have only one younger sibling.'},{sp:'B',id:'Iya, keluarga besar itu menyenangkan!',en:'Yes, a big family is enjoyable!'}],phrases:[{id:'Berapa umur kamu?',en:'How old are you?',ctx:'Common early question — always polite in Indonesian culture'},{id:'Saya... tahun.',en:'I am ... years old.',ctx:'Fill in the number — tahun = year'},{id:'Wah, benarkah?',en:'Wow, really?',ctx:'Showing genuine interest or surprise'},{id:'Saya tidak tahu.',en:'I don\'t know.',ctx:'Honest and perfectly natural to say'},{id:'Kami semua baik-baik saja.',en:'We are all doing well.',ctx:'Answering about a group — family or friends'},{id:'Hanya kami berdua.',en:'Just the two of us.',ctx:'berdua = the two of us, a useful compound'},{id:'Siapa dia?',en:'Who is that/he/she?',ctx:'Asking about someone — natural and polite'},{id:'Ini teman saya.',en:'This is my friend.',ctx:'Introducing someone next to you'}],reading:{text:'Saya punya keluarga kecil. Ada saya, ibu, bapak, dan satu adik. Adik saya berumur tujuh tahun. Dia lucu sekali! Kami tinggal di Bandung.',translation:'I have a small family. There is me, mother, father, and one younger sibling. My sibling is 7 years old. They are very cute! We live in Bandung.',questions:[{q:'Berapa orang di keluarga ini?',a:'Empat orang',hint:'Count the family members listed'},{q:'Berapa umur adiknya?',a:'Tujuh tahun',hint:'How old is the sibling?'},{q:'Di mana mereka tinggal?',a:'Bandung',hint:'Where do they live? Last sentence'}]},exercises:[{type:'fill',prompt:'Saya punya ___ saudara. (I have three siblings)',ans:'tiga',hint:'The number 3'},{type:'fill',prompt:'Berapa ___ kamu? — Saya dua puluh tahun.',ans:'umur',hint:'The word for \'age\''},{type:'order',words:['satu','Kami','ada','dan','dua'],ans:'Kami ada satu dan dua',en:'We have one and two (explaining family)'},{type:'fill',prompt:'___ kami bertiga. (There are three of us)',ans:'Kami',hint:'Subject meaning \'we\' (not including you)'}]},
3:{dialogue:[{sp:'A',id:'Budi, ini foto keluarga saya.',en:'Budi, this is a photo of my family.'},{sp:'B',id:'Oh, yang mana ibu kamu?',en:'Oh, which one is your mother?'},{sp:'A',id:'Ini ibu saya. Dia baik dan sabar sekali.',en:'This is my mother. She is very kind and patient.'},{sp:'B',id:'Wah, mirip kamu! Dan ini bapak kamu?',en:'Wow, you look alike! And is this your father?'},{sp:'A',id:'Iya, bapak saya guru. Dia suka baca buku.',en:'Yes, my father is a teacher. He likes reading books.'},{sp:'B',id:'Keluarga kamu kelihatan menyenangkan!',en:'Your family looks lovely!'}],phrases:[{id:'Ini foto keluarga saya.',en:'This is a photo of my family.',ctx:'Natural way to share a photo'},{id:'Dia mirip kamu!',en:'He/She looks like you!',ctx:'Commenting on family resemblance'},{id:'Bapak saya bekerja sebagai...',en:'My father works as a...',ctx:'Describing profession — sebagai = as/working as'},{id:'Ibu saya ibu rumah tangga.',en:'My mother is a homemaker.',ctx:'ibu rumah tangga literally = house tangga mother'},{id:'Kami tinggal bersama.',en:'We live together.',ctx:'tinggal = to live/reside, bersama = together'},{id:'Nenek saya masih sehat.',en:'My grandmother is still healthy.',ctx:'masih = still — very useful word'},{id:'Kami dekat sekali.',en:'We are very close.',ctx:'Describing a warm family relationship'},{id:'Sudah menikah?',en:'Are you married?',ctx:'Common question among adults — not considered rude in Indonesia'}],reading:{text:'Nama kakak saya Rina. Dia sudah menikah dan punya dua anak. Suaminya bernama Doni. Mereka tinggal di Surabaya. Setiap Lebaran, seluruh keluarga berkumpul di rumah nenek.',translation:'My older sibling\'s name is Rina. She is already married and has two children. Her husband\'s name is Doni. They live in Surabaya. Every Eid, the whole family gathers at grandma\'s house.',questions:[{q:'Siapa nama kakaknya?',a:'Rina',hint:'Name is in the first sentence'},{q:'Di mana Rina dan Doni tinggal?',a:'Surabaya',hint:'Where do they live?'},{q:'Kapan seluruh keluarga berkumpul?',a:'Setiap Lebaran',hint:'Every... what occasion?'}]},exercises:[{type:'fill',prompt:'___ saya bernama Rina. (My older sibling\'s name is Rina)',ans:'Kakak',hint:'Older sibling'},{type:'fill',prompt:'Dia sudah ___. (She is already married)',ans:'menikah',hint:'The verb \'to be married\''},{type:'order',words:['tinggal','Mereka','Surabaya','di'],ans:'Mereka tinggal di Surabaya',en:'They live in Surabaya'},{type:'fill',prompt:'Ibu saya ___ dan sabar. (My mother is kind and patient)',ans:'baik',hint:'The adjective meaning \'kind/good\''}]},
4:{dialogue:[{sp:'A',id:'Siti, tas kamu bagus sekali! Warnanya apa?',en:'Siti, your bag is very nice! What color is it?'},{sp:'B',id:'Terima kasih! Ini biru tua. Kamu suka warna apa?',en:'Thank you! This is dark blue. What color do you like?'},{sp:'A',id:'Saya suka hijau. Sepatu kamu juga baru ya?',en:'I like green. Your shoes are also new, right?'},{sp:'B',id:'Iya! Saya beli kemarin. Harganya murah sekali.',en:'Yes! I bought them yesterday. The price was very cheap.'},{sp:'A',id:'Wah, di mana kamu belinya?',en:'Wow, where did you buy them?'},{sp:'B',id:'Di pasar tradisional dekat rumah saya.',en:'At the traditional market near my house.'}],phrases:[{id:'Warna apa ini?',en:'What color is this?',ctx:'Asking about a color you don\'t know'},{id:'Saya suka warna...',en:'I like the color...',ctx:'Expressing color preference'},{id:'Ini baru atau lama?',en:'Is this new or old?',ctx:'Asking about condition of an object'},{id:'Ada warna lain?',en:'Is there another color?',ctx:'Shopping question — when you want options'},{id:'Yang mana yang kamu mau?',en:'Which one do you want?',ctx:'Helping someone choose — yang mana = which one'},{id:'Boleh saya lihat?',en:'May I see/look?',ctx:'Asking to examine something — very common when shopping'},{id:'Ini terlalu besar/kecil.',en:'This is too big/small.',ctx:'Essential for shopping — terlalu = too (much)'},{id:'Apakah ada ukuran yang lebih kecil?',en:'Is there a smaller size?',ctx:'Asking for a different size'}],reading:{text:'Kamar saya tidak terlalu besar. Ada meja coklat, kursi hitam, dan lemari biru. Di atas meja ada buku merah dan tas hijau saya. Jendela kamar saya menghadap taman yang indah.',translation:'My room is not too big. There is a brown table, black chair, and blue wardrobe. On the table is my red book and green bag. My room\'s window faces a beautiful garden.',questions:[{q:'Apa warna mejanya?',a:'Coklat',hint:'Color of the table'},{q:'Ada apa di atas meja?',a:'Buku merah dan tas hijau',hint:'What is on top of the table?'},{q:'Ke mana jendela kamar menghadap?',a:'Ke taman yang indah',hint:'What does the window face?'}]},exercises:[{type:'fill',prompt:'Tas ___ saya. (My blue bag — adjective after noun!)',ans:'biru',hint:'The color blue'},{type:'fill',prompt:'Ini ___ besar, ada yang lebih kecil? (This is too big, is there a smaller one?)',ans:'terlalu',hint:'The word meaning \'too (much)\''},{type:'order',words:['meja','di','buku','atas','Ada'],ans:'Ada buku di atas meja',en:'There is a book on the table'},{type:'fill',prompt:'Boleh saya ___? (May I see/look?)',ans:'lihat',hint:'The verb \'to see/look\''}]},
5:{dialogue:[{sp:'A',id:'Jam berapa sekarang, Budi?',en:'What time is it now, Budi?'},{sp:'B',id:'Sekarang jam sembilan kurang lima menit.',en:'It\'s now five minutes to nine.'},{sp:'A',id:'Aduh, saya terlambat! Kelas mulai jam sembilan.',en:'Oh no, I\'m late! Class starts at nine.'},{sp:'B',id:'Tenang saja, dari sini hanya lima menit jalan kaki.',en:'Don\'t worry, from here it\'s only five minutes on foot.'},{sp:'A',id:'Oke! Kita bertemu jam dua belas siang ya?',en:'Okay! We meet at 12 noon, right?'},{sp:'B',id:'Iya, di kantin. Jangan terlambat lagi!',en:'Yes, at the canteen. Don\'t be late again!'}],phrases:[{id:'Jam berapa kelas mulai?',en:'What time does class start?',ctx:'mulai = to start/begin'},{id:'Saya terlambat!',en:'I am late!',ctx:'terlambat = late — very useful to know!'},{id:'Masih lama?',en:'Is it much longer? / Is there still a long wait?',ctx:'Asking how much time remains'},{id:'Sebentar lagi.',en:'Just a little longer / In a moment.',ctx:'Reassuring someone it won\'t take long'},{id:'Tepat waktu.',en:'On time / Punctual.',ctx:'Complimenting or confirming punctuality'},{id:'Kita janjian jam berapa?',en:'What time do we have an appointment?',ctx:'janjian = to make an appointment/plan to meet'},{id:'Saya tunggu kamu di sini.',en:'I\'ll wait for you here.',ctx:'tunggu = to wait — very common'},{id:'Sudah hampir tiba.',en:'Almost arrived / Almost there.',ctx:'Texting someone you\'re nearly there'}],reading:{text:'Jadwal harian saya sangat padat. Saya bangun jam lima pagi dan mandi. Jam enam saya sarapan bersama keluarga. Jam tujuh saya berangkat ke kantor. Saya pulang ke rumah jam enam sore. Malam hari, saya belajar Bahasa Indonesia selama satu jam.',translation:'My daily schedule is very packed. I wake up at 5am and shower. At 6 I have breakfast with family. At 7 I leave for the office. I return home at 6pm. In the evening, I study Indonesian for one hour.',questions:[{q:'Jam berapa dia bangun?',a:'Jam lima pagi',hint:'When does he/she wake up?'},{q:'Jam berapa dia berangkat ke kantor?',a:'Jam tujuh',hint:'When does he/she leave for the office?'},{q:'Apa yang dia lakukan di malam hari?',a:'Belajar Bahasa Indonesia',hint:'What does he/she do in the evening?'}]},exercises:[{type:'fill',prompt:'Jam ___ sekarang? (What time is it now?)',ans:'berapa',hint:'The question word for numbers'},{type:'fill',prompt:'Saya ___ ke kantor jam tujuh. (I leave for the office at 7)',ans:'berangkat',hint:'The verb \'to depart/leave\''},{type:'order',words:['pagi','lima','Jam','saya','bangun'],ans:'Jam lima saya bangun pagi',en:'At five I wake up in the morning'},{type:'fill',prompt:'Kita ___ jam dua belas ya? (We meet at 12, right?)',ans:'bertemu',hint:'The verb \'to meet\''}]},
6:{dialogue:[{sp:'A',id:'Halo Siti! Sudah lama tidak bertemu.',en:'Hello Siti! Long time no see.'},{sp:'B',id:'Iya! Apa kabar? Kamu kelihatan sehat.',en:'Yes! How are you? You look healthy.'},{sp:'A',id:'Baik sekali, terima kasih! Kamu sendiri bagaimana?',en:'Very well, thank you! How about yourself?'},{sp:'B',id:'Saya juga baik. Lagi sibuk dengan pekerjaan.',en:'I\'m fine too. Quite busy with work.'},{sp:'A',id:'Oh ya? Kamu kerja di mana sekarang?',en:'Oh really? Where do you work now?'},{sp:'B',id:'Saya masih di perusahaan yang sama. Sudah tiga tahun!',en:'I\'m still at the same company. Already three years!'}],phrases:[{id:'Sudah lama tidak bertemu!',en:'Long time no see!',ctx:'Warm greeting for someone you haven\'t seen in a while'},{id:'Kamu kelihatan sehat/baik.',en:'You look healthy/well.',ctx:'A warm compliment about someone\'s appearance'},{id:'Masih ingat saya?',en:'Do you still remember me?',ctx:'When meeting someone you haven\'t seen in years'},{id:'Kita harus jalan-jalan bareng!',en:'We should hang out together!',ctx:'jalan-jalan = to stroll/go around, bareng = together'},{id:'Kapan-kapan ya!',en:'Some time soon! (casual)',ctx:'A warm but non-committal plan to meet — very Indonesian'},{id:'Salam untuk keluarga ya.',en:'Regards to your family.',ctx:'A warm way to end a conversation'},{id:'Hati-hati di jalan.',en:'Take care on the road / Be safe.',ctx:'Standard goodbye — shows genuine care'},{id:'Sampai ketemu lagi!',en:'Until we meet again!',ctx:'Warmer and more personal than sampai jumpa'}],reading:{text:'Budi dan Siti bertemu di kafe. Mereka sudah lama tidak bertemu. Budi memesan kopi hitam, dan Siti memesan teh manis. Mereka berbicara tentang pekerjaan dan keluarga. Waktu berlalu sangat cepat. Sebelum pulang, mereka berfoto bersama.',translation:'Budi and Siti meet at a café. They haven\'t met in a long time. Budi orders black coffee, and Siti orders sweet tea. They talk about work and family. Time passes very quickly. Before going home, they take a photo together.',questions:[{q:'Di mana Budi dan Siti bertemu?',a:'Di kafe',hint:'Where do they meet?'},{q:'Apa yang Budi pesan?',a:'Kopi hitam',hint:'What does Budi order?'},{q:'Apa yang mereka lakukan sebelum pulang?',a:'Berfoto bersama',hint:'What do they do before going home?'}]},exercises:[{type:'fill',prompt:'Sudah lama tidak ___! (Long time no see!)',ans:'bertemu',hint:'The verb \'to meet\''},{type:'fill',prompt:'Kamu ___ sehat hari ini. (You look healthy today)',ans:'kelihatan',hint:'The verb \'to look/appear\''},{type:'order',words:['keluarga','untuk','Salam','ya'],ans:'Salam untuk keluarga ya',en:'Regards to the family'},{type:'fill',prompt:'Kapan-___! (Some time soon!)',ans:'kapan',hint:'Repeat the time word to make it casual'}]},
7:{dialogue:[{sp:'A',id:'Hari ini kamu mau ngapain, Siti?',en:'What are you going to do today, Siti?'},{sp:'B',id:'Saya mau santai di rumah. Mungkin dengar musik.',en:'I want to relax at home. Maybe listen to music.'},{sp:'A',id:'Lagu Indonesia apa yang kamu suka?',en:'What Indonesian songs do you like?'},{sp:'B',id:'Saya suka Hindia dan Tulus. Lagunya indah sekali.',en:'I like Hindia and Tulus. Their songs are so beautiful.'},{sp:'A',id:'Wah, selera kita sama! Saya juga suka mereka.',en:'Wow, we have the same taste! I like them too.'},{sp:'B',id:'Coba dengar lagu Tulus yang \'Gajah\'. Kamu pasti suka!',en:'Try listening to Tulus\'s song \'Gajah\'. You\'ll definitely like it!'}],phrases:[{id:'Hari ini mau ngapain?',en:'What are you going to do today?',ctx:'Casual — ngapain is informal contraction of \'mau apa\''},{id:'Saya mau bersantai.',en:'I want to relax.',ctx:'bersantai / santai = to relax — very Indonesian concept'},{id:'Tidak ada rencana khusus.',en:'No special plans.',ctx:'rencana = plan, khusus = special'},{id:'Coba dengarkan ini!',en:'Try listening to this!',ctx:'coba = try — encouraging someone gently'},{id:'Selera kita sama!',en:'We have the same taste!',ctx:'selera = taste/preference — great for bonding'},{id:'Aku suka banget lagu ini.',en:'I really love this song.',ctx:'Informal — suka banget = like very much'},{id:'Liriknya bagus sekali.',en:'The lyrics are so good.',ctx:'lirik = lyrics — common music discussion word'},{id:'Istirahat dulu ya.',en:'Rest first, okay.',ctx:'dulu = first, ya softens it — very natural'}],reading:{text:'Hari Minggu adalah hari favorit saya. Saya tidak bekerja dan bisa santai. Biasanya saya bangun lebih lambat dari biasa. Saya suka minum kopi sambil dengar musik. Kadang saya juga membaca buku atau jalan-jalan di taman. Hari Minggu membuat saya siap untuk minggu baru.',translation:'Sunday is my favourite day. I don\'t work and can relax. Usually I wake up later than usual. I like drinking coffee while listening to music. Sometimes I also read books or stroll in the park. Sunday makes me ready for the new week.',questions:[{q:'Hari apa yang favorit?',a:'Hari Minggu',hint:'Which day is the favourite?'},{q:'Apa yang dia lakukan sambil minum kopi?',a:'Dengar musik',hint:'What does he/she do while drinking coffee?'},{q:'Apa fungsi hari Minggu baginya?',a:'Membuat siap untuk minggu baru',hint:'What does Sunday do for him/her?'}]},exercises:[{type:'fill',prompt:'Hari ini saya mau ___. (Today I want to relax)',ans:'bersantai',hint:'The formal verb for \'to relax\''},{type:'fill',prompt:'Saya dengar musik ___ minum kopi. (I listen to music while drinking coffee)',ans:'sambil',hint:'The word meaning \'while/simultaneously\''},{type:'order',words:['sama!','kita','Selera'],ans:'Selera kita sama!',en:'We have the same taste!'},{type:'fill',prompt:'___ dulu ya! (Rest first!)',ans:'Istirahat',hint:'The verb \'to rest\''}]},
8:{dialogue:[{sp:'A',id:'Setiap hari kamu pergi ke mana?',en:'Where do you go every day?'},{sp:'B',id:'Saya pergi ke kantor. Saya bekerja sebagai akuntan.',en:'I go to the office. I work as an accountant.'},{sp:'A',id:'Naik apa kamu ke kantor?',en:'How do you get to the office?'},{sp:'B',id:'Saya naik kereta. Cepat dan tidak macet.',en:'I take the train. It\'s fast and not congested.'},{sp:'A',id:'Bagus! Saya naik ojek setiap hari. Lebih fleksibel.',en:'Nice! I take an ojek every day. More flexible.'},{sp:'B',id:'Iya, tapi hujan-hujanan dong kalau naik ojek!',en:'Yes, but you get rained on when riding an ojek!'}],phrases:[{id:'Saya bekerja sebagai...',en:'I work as a...',ctx:'sebagai = as (profession) — always use for job descriptions'},{id:'Jam kerja saya pukul... sampai...',en:'My working hours are ... to ...',ctx:'pukul = o\'clock (formal), sampai = until'},{id:'Macet parah hari ini.',en:'The traffic is very bad today.',ctx:'macet = traffic jam — an essential Jakarta word!'},{id:'Saya lembur hari ini.',en:'I\'m working overtime today.',ctx:'lembur = overtime — very common in Indonesian work culture'},{id:'Bos saya baik.',en:'My boss is nice.',ctx:'Simple but practical — bos is widely used'},{id:'Rapat jam berapa?',en:'What time is the meeting?',ctx:'rapat = meeting/gathering — key office word'},{id:'Saya kirim email dulu ya.',en:'Let me send the email first.',ctx:'kirim = to send — applies to email, messages, packages'},{id:'Selamat bekerja!',en:'Have a productive work day!',ctx:'A warm phrase said to someone starting work'}],reading:{text:'Hari kerja saya dimulai jam delapan pagi. Saya duduk di meja dan membuka komputer. Pagi hari biasanya untuk membaca email. Siang hari saya sering ada rapat dengan tim. Sore hari saya menyelesaikan laporan. Jam lima sore, saya pulang ke rumah.',translation:'My work day starts at 8am. I sit at my desk and open the computer. Mornings are usually for reading emails. During the day I often have meetings with the team. In the afternoon I finish reports. At 5pm, I go home.',questions:[{q:'Jam berapa hari kerja mulai?',a:'Jam delapan pagi',hint:'When does the work day begin?'},{q:'Apa yang dia lakukan di pagi hari?',a:'Membaca email',hint:'Morning activity'},{q:'Kapan dia pulang ke rumah?',a:'Jam lima sore',hint:'When does he/she go home?'}]},exercises:[{type:'fill',prompt:'Saya bekerja ___ dokter. (I work as a doctor)',ans:'sebagai',hint:'The word meaning \'as\' for professions'},{type:'fill',prompt:'Jakarta ___ parah setiap pagi. (Jakarta has bad traffic every morning)',ans:'macet',hint:'The word for traffic jam'},{type:'order',words:['kerja','berangkat','saya','ke','Jam','tujuh'],ans:'Jam tujuh saya berangkat ke kerja',en:'At seven I leave for work'},{type:'fill',prompt:'___ email dulu ya. (Let me send the email first)',ans:'Kirim',hint:'The verb \'to send\''}]},
9:{dialogue:[{sp:'A',id:'Permisi, ada nasi goreng?',en:'Excuse me, do you have fried rice?'},{sp:'B',id:'Ada! Mau pakai telur atau ayam?',en:'Yes! Do you want it with egg or chicken?'},{sp:'A',id:'Pakai ayam saja. Dan kurang pedas ya.',en:'With chicken please. And not too spicy.'},{sp:'B',id:'Oke, mau minum apa? Ada es teh dan air mineral.',en:'Okay, what would you like to drink? We have iced tea and mineral water.'},{sp:'A',id:'Es teh manis satu. Berapa harganya semua?',en:'One sweet iced tea. How much is everything?'},{sp:'B',id:'Dua puluh ribu rupiah saja, Kak.',en:'Just twenty thousand rupiah.'}],phrases:[{id:'Meja untuk berapa orang?',en:'Table for how many people?',ctx:'Standard first question at a restaurant'},{id:'Boleh lihat menunya?',en:'May I see the menu?',ctx:'Polite restaurant opener — use it every time'},{id:'Kurang pedas ya.',en:'Not too spicy, please.',ctx:'Essential for spice-sensitive visitors — kurang = less'},{id:'Tidak pakai... ya.',en:'Without..., please.',ctx:'Removing an ingredient — pakai = using/with'},{id:'Sudah termasuk...?',en:'Is ... already included?',ctx:'Asking if something is included in the price'},{id:'Minta bon / notanya.',en:'May I have the bill?',ctx:'bon or nota = bill/receipt — use either'},{id:'Enak sekali, saya tambah lagi!',en:'Very delicious, I\'ll have more!',ctx:'tambah = add/more — the highest compliment to a cook!'},{id:'Dibungkus ya.',en:'Wrapped up to go, please.',ctx:'bungkus = to wrap — ordering takeaway'}],reading:{text:'Warung Bu Tini terkenal di kampung kami. Dia masak nasi goreng, mie goreng, dan soto ayam. Harganya murah tapi rasanya enak sekali. Setiap pagi, banyak orang sarapan di sana. Saya suka memesan nasi goreng dengan telur mata sapi dan es teh manis.',translation:'Bu Tini\'s warung is famous in our village. She cooks fried rice, fried noodles, and chicken soto. The prices are cheap but the taste is delicious. Every morning, many people have breakfast there. I like to order fried rice with a sunny-side up egg and sweet iced tea.',questions:[{q:'Apa yang dijual di warung Bu Tini?',a:'Nasi goreng, mie goreng, dan soto ayam',hint:'What does she sell? Three items'},{q:'Bagaimana harga di warung Bu Tini?',a:'Murah',hint:'How are the prices?'},{q:'Apa pesanan favorit penulis?',a:'Nasi goreng dengan telur mata sapi dan es teh manis',hint:'What does the writer like to order?'}]},exercises:[{type:'fill',prompt:'Saya mau nasi goreng, ___ pedas ya. (I want fried rice, not too spicy)',ans:'kurang',hint:'The word meaning \'less/not enough\''},{type:'fill',prompt:'Boleh minta ___? (May I have the bill?)',ans:'bonnya',hint:'Bill/receipt + the suffix -nya'},{type:'order',words:['enak','banget','ini','Makanan'],ans:'Makanan ini enak banget',en:'This food is so delicious'},{type:'fill',prompt:'Saya mau ___ ya. (I want to take it to go)',ans:'dibungkus',hint:'Wrapped up to go'}]},
10:{dialogue:[{sp:'A',id:'Maaf, di mana halte bus terdekat?',en:'Excuse me, where is the nearest bus stop?'},{sp:'B',id:'Halte bus ada di seberang jalan itu.',en:'The bus stop is across that road.'},{sp:'A',id:'Bus nomor berapa yang ke stasiun?',en:'What bus number goes to the station?'},{sp:'B',id:'Naik bus nomor lima belas. Turun di simpang tiga.',en:'Take bus number 15. Get off at the T-junction.'},{sp:'A',id:'Berapa menit dari sini?',en:'How many minutes from here?'},{sp:'B',id:'Kira-kira dua puluh menit kalau tidak macet.',en:'Approximately 20 minutes if there\'s no traffic.'}],phrases:[{id:'Di mana halte bus terdekat?',en:'Where is the nearest bus stop?',ctx:'halte = bus stop, terdekat = nearest'},{id:'Naik yang mana?',en:'Which one do I take?',ctx:'Asking which bus/train/lane to use'},{id:'Turun di mana?',en:'Where do I get off?',ctx:'turun = to get off/descend — opposite of naik'},{id:'Berapa jauh dari sini?',en:'How far is it from here?',ctx:'Direct distance question'},{id:'Kira-kira berapa menit?',en:'Approximately how many minutes?',ctx:'kira-kira = approximately — use for estimates'},{id:'Salah jalan!',en:'Wrong way! / I took the wrong road!',ctx:'When you realise you\'re lost'},{id:'Tolong antar saya ke...',en:'Please take me to...',ctx:'Asking for a ride or to be taken somewhere'},{id:'Berhenti di sini saja.',en:'Stop here, please.',ctx:'Telling a driver to stop — in ojek, taxi, bus'}],reading:{text:'Transportasi di Jakarta sangat beragam. Ada bus TransJakarta, MRT, KRL, ojek, dan taksi. MRT adalah pilihan paling cepat untuk melintasi kota. Harganya mulai dari tiga ribu rupiah. Ojek online seperti Gojek sangat populer karena fleksibel. Banyak orang menggunakan aplikasi di ponsel untuk memesan ojek.',translation:'Transportation in Jakarta is very diverse. There is TransJakarta bus, MRT, KRL, ojek, and taxi. MRT is the fastest option for crossing the city. Prices start from three thousand rupiah. Online ojek like Gojek is very popular because it\'s flexible. Many people use apps on their phones to order ojek.',questions:[{q:'Apa transportasi tercepat di Jakarta?',a:'MRT',hint:'Fastest option for crossing the city'},{q:'Berapa harga MRT paling murah?',a:'Tiga ribu rupiah',hint:'Starting price'},{q:'Mengapa ojek online sangat populer?',a:'Karena fleksibel',hint:'Why is it popular?'}]},exercises:[{type:'fill',prompt:'___ di sini saja. (Stop here please)',ans:'Berhenti',hint:'The verb \'to stop\''},{type:'fill',prompt:'Berapa menit ___ sini? (How many minutes from here?)',ans:'dari',hint:'The preposition \'from\''},{type:'order',words:['stasiun','ke','bus','Naik','nomor','sepuluh'],ans:'Naik bus nomor sepuluh ke stasiun',en:'Take bus number ten to the station'},{type:'fill',prompt:'___ kira dua puluh menit. (Approximately 20 minutes)',ans:'Kira',hint:'First half of the word for \'approximately\''}]},
11:{dialogue:[{sp:'A',id:'Permisi, rumah sakit ada di mana?',en:'Excuse me, where is the hospital?'},{sp:'B',id:'Lurus terus, lalu belok kiri di lampu merah.',en:'Go straight ahead, then turn left at the traffic light.'},{sp:'A',id:'Jauh tidak dari sini?',en:'Is it far from here?'},{sp:'B',id:'Tidak terlalu jauh. Kira-kira sepuluh menit jalan kaki.',en:'Not too far. About ten minutes on foot.'},{sp:'A',id:'Terima kasih banyak, Pak!',en:'Thank you very much, sir!'},{sp:'B',id:'Sama-sama. Hati-hati ya, semoga cepat sembuh!',en:'You\'re welcome. Take care, hope you recover soon!'}],phrases:[{id:'Lurus terus sampai...',en:'Go straight until...',ctx:'lurus terus = keep going straight, very clear direction'},{id:'Di sebelah kiri/kanan...',en:'On the left/right side...',ctx:'Describing location relative to direction'},{id:'Tidak bisa lewat sini.',en:'You can\'t go through here.',ctx:'Being told about a blocked road or private property'},{id:'Ada jalan pintas?',en:'Is there a shortcut?',ctx:'jalan pintas = shortcut — useful when in a hurry'},{id:'Saya tersesat.',en:'I am lost.',ctx:'tersesat = lost (of direction) — important to know!'},{id:'Tolong tunjukkan di peta.',en:'Please show me on the map.',ctx:'tunjukkan = show, peta = map'},{id:'Dekat dengan...',en:'Near / Close to...',ctx:'Giving a landmark as reference point'},{id:'Semoga cepat sembuh!',en:'Hope you recover soon!',ctx:'Warm phrase for someone who is sick'}],reading:{text:'Kantor saya ada di pusat kota. Dari stasiun, saya harus berjalan kaki lima menit ke utara. Kemudian belok kanan di perempatan pertama. Gedung kantor saya berwarna biru dan sangat tinggi. Ada warung kopi tepat di sebelah pintu masuk. Saya selalu beli kopi di sana sebelum masuk kerja.',translation:'My office is in the city centre. From the station, I have to walk five minutes north. Then turn right at the first crossroads. My office building is blue and very tall. There is a coffee stall right next to the entrance. I always buy coffee there before going in to work.',questions:[{q:'Di mana letak kantor ini?',a:'Di pusat kota',hint:'Where is the office located?'},{q:'Apa warna gedung kantornya?',a:'Biru',hint:'What color is the building?'},{q:'Apa yang dia lakukan sebelum masuk kerja?',a:'Beli kopi',hint:'What does he/she do before entering work?'}]},exercises:[{type:'fill',prompt:'___ terus sampai lampu merah. (Go straight until the traffic light)',ans:'Lurus',hint:'The direction word for \'straight\''},{type:'fill',prompt:'Saya ___. Tolong bantu saya! (I am lost. Please help me!)',ans:'tersesat',hint:'The verb/adjective for being lost'},{type:'order',words:['kanan','Belok','pertama','di','perempatan'],ans:'Belok kanan di perempatan pertama',en:'Turn right at the first crossroads'},{type:'fill',prompt:'Kantornya ada di ___ kiri jalan. (The office is on the left side of the road)',ans:'sebelah',hint:'The word meaning \'side of\''}]},
12:{dialogue:[{sp:'A',id:'Budi, kamu biasanya bangun jam berapa?',en:'Budi, what time do you usually wake up?'},{sp:'B',id:'Saya bangun jam lima setiap pagi untuk sholat.',en:'I wake up at five every morning to pray.'},{sp:'A',id:'Wah, rajin! Saya susah bangun pagi.',en:'Wow, diligent! I have trouble waking up early.'},{sp:'B',id:'Haha, kebiasaan saja. Kamu sarapan apa tadi?',en:'Haha, just habit. What did you have for breakfast earlier?'},{sp:'A',id:'Saya sarapan roti dan telur. Cepat dan praktis.',en:'I had bread and egg. Quick and practical.'},{sp:'B',id:'Besok coba sarapan nasi uduk. Lebih mengenyangkan!',en:'Tomorrow try having nasi uduk for breakfast. More filling!'}],phrases:[{id:'Kamu biasanya ngapain pagi hari?',en:'What do you usually do in the morning?',ctx:'biasanya = usually — key routine word'},{id:'Saya sudah terbiasa.',en:'I\'m already used to it.',ctx:'terbiasa = accustomed to — about habits'},{id:'Susah bangun pagi.',en:'It\'s hard to wake up early.',ctx:'Very relatable! susah = difficult/hard'},{id:'Saya sarapan dulu ya.',en:'I\'ll have breakfast first.',ctx:'A natural morning phrase'},{id:'Hari ini hari apa?',en:'What day is it today?',ctx:'Simple but essential daily question'},{id:'Besok ada acara apa?',en:'What\'s happening tomorrow?',ctx:'acara = event/program — very useful social word'},{id:'Akhir pekan ini mau apa?',en:'What are you doing this weekend?',ctx:'akhir pekan = weekend — essential social phrase'},{id:'Semangat pagi!',en:'Good morning energy! / Rise and shine!',ctx:'Energetic morning greeting — very Indonesian spirit'}],reading:{text:'Rutinitas pagi saya selalu sama. Senin sampai Jumat, saya bangun jam enam. Saya mandi air dingin supaya segar. Kemudian saya berpakaian dan sarapan. Hari Sabtu dan Minggu adalah hari libur saya. Sabtu saya biasa ke pasar, dan Minggu saya istirahat di rumah.',translation:'My morning routine is always the same. Monday to Friday, I wake up at six. I shower with cold water to feel refreshed. Then I get dressed and have breakfast. Saturday and Sunday are my days off. On Saturday I usually go to the market, and Sunday I rest at home.',questions:[{q:'Jam berapa dia bangun hari kerja?',a:'Jam enam',hint:'What time on weekdays?'},{q:'Mengapa dia mandi air dingin?',a:'Supaya segar',hint:'Why cold water? supaya = so that'},{q:'Apa yang dia lakukan setiap Sabtu?',a:'Ke pasar',hint:'What does he/she do on Saturdays?'}]},exercises:[{type:'fill',prompt:'Saya ___ bangun pagi. (I\'m used to waking up early)',ans:'terbiasa',hint:'Accustomed to / used to'},{type:'fill',prompt:'___ ini hari apa? (What day is it today?)',ans:'Hari',hint:'The word for \'day\''},{type:'order',words:['Jumat','sampai','Senin','kerja','Hari'],ans:'Hari kerja Senin sampai Jumat',en:'Work days Monday to Friday'},{type:'fill',prompt:'Besok ada ___ apa? (What\'s happening tomorrow?)',ans:'acara',hint:'The word for event/program'}]},
13:{dialogue:[{sp:'A',id:'Siti, ini bukan tas kamu kan?',en:'Siti, this isn\'t your bag, is it?'},{sp:'B',id:'Bukan, itu bukan tas saya. Punya siapa ya?',en:'No, that\'s not my bag. Whose is it, I wonder?'},{sp:'A',id:'Tidak ada namanya. Isinya juga tidak jelas.',en:'There\'s no name on it. The contents are also unclear.'},{sp:'B',id:'Mungkin tas itu ketinggalan. Kita lapor ke keamanan.',en:'Maybe that bag was left behind. Let\'s report to security.'},{sp:'A',id:'Iya betul. Jangan sampai ada yang kehilangan.',en:'Yes that\'s right. We don\'t want anyone to lose it.'},{sp:'B',id:'Kamu baik sekali, selalu mau membantu orang lain!',en:'You\'re so kind, always wanting to help others!'}],phrases:[{id:'Ini bukan milik saya.',en:'This does not belong to me.',ctx:'milik = possession/belonging — important legal/polite word'},{id:'Saya tidak setuju.',en:'I disagree.',ctx:'Direct but polite way to disagree'},{id:'Itu bukan salah saya.',en:'That is not my fault.',ctx:'salah = wrong/mistake/fault'},{id:'Jangan khawatir.',en:'Don\'t worry.',ctx:'khawatir = worried — very common reassurance'},{id:'Tidak ada masalah.',en:'There is no problem.',ctx:'Stronger reassurance than \'tidak apa-apa\''},{id:'Saya belum siap.',en:'I\'m not ready yet.',ctx:'siap = ready — implies you will be ready soon'},{id:'Itu bukan urusan saya.',en:'That is not my business/concern.',ctx:'urusan = matter/affair — setting a boundary politely'},{id:'Jangan sampai terlambat ya!',en:'Make sure you\'re not late!',ctx:'Jangan sampai = make sure not to — strong reminder'}],reading:{text:'Kemarin saya tidak bisa pergi ke kantor. Saya tidak sakit, tapi mobil saya tidak bisa menyala. Saya sudah coba berkali-kali tapi tidak bisa. Akhirnya saya telepon mekanik. Mekanik bilang masalahnya bukan di mesin, tapi di aki. Untungnya aki baru tidak terlalu mahal.',translation:'Yesterday I couldn\'t go to the office. I wasn\'t sick, but my car wouldn\'t start. I tried many times but it wouldn\'t work. Finally I called a mechanic. The mechanic said the problem wasn\'t in the engine, but in the battery. Fortunately a new battery wasn\'t too expensive.',questions:[{q:'Mengapa dia tidak ke kantor kemarin?',a:'Karena mobilnya tidak bisa menyala',hint:'Why couldn\'t he/she go to the office?'},{q:'Apa masalah mobilnya?',a:'Akinya (baterai)',hint:'What was the car\'s problem?'},{q:'Apakah aki baru mahal?',a:'Tidak terlalu mahal',hint:'Was the new battery expensive?'}]},exercises:[{type:'fill',prompt:'Ini ___ milik saya. (This does not belong to me)',ans:'bukan',hint:'Not for nouns/identity'},{type:'fill',prompt:'Saya ___ siap. (I\'m not ready yet — but I will be)',ans:'belum',hint:'Not yet'},{type:'order',words:['khawatir','Jangan','ya!'],ans:'Jangan khawatir ya!',en:'Don\'t worry!'},{type:'fill',prompt:'___ ada masalah. (There is no problem)',ans:'Tidak',hint:'Negation for states/facts'}]},
